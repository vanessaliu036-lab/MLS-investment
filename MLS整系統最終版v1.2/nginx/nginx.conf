worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20m;

    # rate limit zone
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;

    upstream mls_api {
        server api:8000;
    }

    server {
        listen 80 default_server;
        server_name _;

        # ACME challenge for certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API reverse proxy
        location /api/ {
            limit_req zone=api_rl burst=60 nodelay;
            proxy_pass         http://mls_api/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # Health
        location = /health {
            proxy_pass http://mls_api/api/health;
        }

        # root: 503 placeholder (前端在 Vercel)
        location / {
            return 503 "MLS backend is up. Frontend: https://mls-v1-2.vercel.app/";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS block — uncomment after certbot succeeds
    # server {
    #     listen 443 ssl http2;
    #     server_name mls.yourdomain.com;
    #     ssl_certificate     /etc/letsencrypt/live/mls.yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/mls.yourdomain.com/privkey.pem;
    #     location /api/ {
    #         proxy_pass http://mls_api/api/;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
