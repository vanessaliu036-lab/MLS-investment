worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20m;

    # rate limit zone
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;

    # VPS: mls-legacy 是 docker compose service name
    upstream mls_api {
        server mls-legacy:8000;
    }

    server {
        listen 80 default_server;
        server_name _;

        # ACME challenge for certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API reverse proxy (全 /api/ 轉發,涵蓋 livermore/strategy_compare/nexora 等新端點)
        location /api/ {
            limit_req zone=api_rl burst=60 nodelay;
            proxy_pass         http://mls_api/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Health (VPS mls-legacy 沒有 /api/health,改用 /api/state 當 health probe)
        location = /health {
            proxy_pass http://mls_api/api/state;
        }
        location = /api/health {
            proxy_pass http://mls_api/api/state;
        }

        # Rankings / Sectors (VPS mls-legacy 對應:rankings 走 /api/eod_rank,sectors 走 /api/state._sectors_full)
        location = /api/rankings {
            proxy_pass http://mls_api/api/eod_rank;
        }
        location = /api/sectors {
            proxy_pass http://mls_api/api/state;
        }
        # Admin → mls-legacy 沒有 admin 端點,直接回 200 placeholder 給前端不要 404
        location = /api/admin {
            return 200 '{"ok":true,"note":"admin 由 Next.js 站 /admin/ 提供"}';
            add_header Content-Type application/json;
        }

        # root: 主系統 index.html
        location / {
            proxy_pass         http://mls_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }
    }
}
