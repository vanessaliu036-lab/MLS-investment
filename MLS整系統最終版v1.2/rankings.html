<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLS 排行 — 觀察池 50 股</title>
<style>
  :root{
    --bg:#faf8f3; --surface:#ffffff; --ink:#1a1d23; --ink2:#6b6256;
    --line:#e8e2d6; --line2:#f0ebe0; --gold:#8a6d1a; --goldbg:#f3ecd8;
    --up:#d0342c; --down:#1a8a5a; --in:#2563c7; --out:#e07b2e;
    --engine:#e9edf5; --engine-t:#3a5074; --attack:#fdeede; --attack-t:#a35a12;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);max-width:560px;margin:0 auto;
    font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    font-size:15px;padding-bottom:40px}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
  .up{color:var(--up)} .down{color:var(--down)}

  /* 頂欄:盤中/盤後切換 */
  .top{position:sticky;top:0;z-index:20;background:rgba(250,248,243,.96);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:12px 16px;display:flex;align-items:center;gap:14px}
  .top .lg{font-weight:800;color:var(--gold);font-size:16px;letter-spacing:.5px}
  .seg{display:flex;background:var(--line2);border-radius:10px;padding:3px;margin-left:auto}
  .seg span{padding:6px 16px;border-radius:8px;font-size:13.5px;font-weight:700;
    color:var(--ink2);cursor:pointer}
  .seg span.on{background:var(--surface);color:var(--ink);
    box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .upd{font-size:11px;color:var(--ink2)}

  /* 族群卡橫捲(截圖「概念主題」風) */
  .sec-title{font-size:17px;font-weight:800;padding:16px 16px 10px}
  .sec-title small{font-weight:400;font-size:11px;color:var(--ink2);margin-left:8px}
  .cards{display:flex;gap:10px;overflow-x:auto;padding:2px 16px 6px;scrollbar-width:none}
  .cards::-webkit-scrollbar{display:none}
  .card{flex:0 0 auto;width:132px;background:var(--surface);border:1.5px solid var(--line);
    border-radius:14px;padding:12px 12px 14px;position:relative;text-align:center}
  .card.first{border-color:var(--up)}
  .card .rk{position:absolute;top:-1px;left:-1px;width:26px;height:26px;
    border-radius:12px 0 12px 0;display:grid;place-items:center;
    font-size:13px;font-weight:800;color:#fff;background:#8b95a8}
  .card.first .rk{background:#e8b427}
  .card:nth-child(2) .rk{background:#9aa4b5}
  .card:nth-child(3) .rk{background:#c07a3e}
  .card .nm{font-size:16px;font-weight:800;margin-top:8px}
  .card .nm.first{color:var(--up)}
  .card .lab{font-size:11px;color:var(--ink2);margin-top:8px}
  .card .pf{font-size:19px;font-weight:800;margin-top:2px}
  .card .quad{font-size:10px;margin-top:6px;color:var(--ink2)}

  /* 榜單頁籤(截圖「熱門排行」風) */
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:6px 16px 12px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:7px 15px;border-radius:9px;background:var(--line2);
    color:var(--ink2);font-size:13.5px;font-weight:700;cursor:pointer}
  .tab.on{background:#fde9e7;color:var(--up)}

  /* 清單列(截圖列表風:名稱大、價大、幅度彩色、右欄熱度) */
  .lhead{display:flex;padding:8px 16px;font-size:12px;color:var(--ink2)}
  .lhead .c1{flex:1.2} .lhead .c2{flex:1;text-align:right}
  .lhead .c3{flex:.9;text-align:right} .lhead .c4{flex:.8;text-align:right}
  .row{display:flex;align-items:center;padding:14px 16px;background:var(--surface);
    border-bottom:1px solid var(--line2)}
  .row .c1{flex:1.2;min-width:0}
  .row .nm{font-size:16.5px;font-weight:800;display:flex;align-items:center;gap:7px}
  .row .nm .tag{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:4px}
  .tag.attack{background:var(--attack);color:var(--attack-t)}
  .tag.engine{background:var(--engine);color:var(--engine-t)}
  .row .cd{font-size:12px;color:var(--ink2);margin-top:3px}
  .row .c2{flex:1;text-align:right;font-size:19px;font-weight:800}
  .row .c3{flex:.9;text-align:right;font-size:16px;font-weight:800}
  .row .c4{flex:.8;text-align:right;font-size:14px;color:var(--ink2);font-weight:700}
  .row .c4 .win{font-size:10px;display:block;margin-top:2px}
  .win.ok{color:var(--up)} .win.no{color:var(--down)}
  .medal{font-size:15px;width:22px;display:inline-block}

  .note{padding:36px 20px;text-align:center;color:var(--ink2);font-size:13.5px;
    background:var(--surface);line-height:1.7}
  .sig{display:flex;gap:12px;padding:10px 16px;font-size:12.5px;color:var(--ink2)}
  .sig b{color:var(--gold)}
</style>
</head>
<body>

<div class="top">
  <span class="lg">MLS 排行</span>
  <span class="upd" id="upd">—</span>
  <div class="seg">
    <span class="on" data-m="live">盤中</span>
    <span data-m="eod">盤後</span>
  </div>
</div>

<div class="sec-title">族群輪動 <small id="secNote">依 Flow/漲幅排行</small></div>
<div class="cards" id="cards"></div>

<div class="sec-title" style="padding-bottom:2px">觀察池排行 <small>50 股</small></div>
<div class="tabs" id="tabs">
  <span class="tab on" data-t="hot">熱門股</span>
  <span class="tab" data-t="gainers">漲幅榜</span>
  <span class="tab" data-t="losers">跌幅榜</span>
  <span class="tab" data-t="volume">量能榜</span>
  <span class="tab" data-t="newhigh">創高榜</span>
</div>
<div class="lhead"><span class="c1">商品名稱</span><span class="c2">最新價</span>
  <span class="c3">漲跌幅</span><span class="c4" id="c4h">熱度</span></div>
<div id="list"></div>
<div class="sig" id="sigline"></div>

<script>
var MODE="live", TAB="hot", live=null, eod=null;
var ENGINE = {"2303":1,"5347":1};
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function pct(v){if(v==null)return"—";
  return '<span class="'+(v>0?"up":(v<0?"down":""))+' mono">'+(v>0?"+":"")+v.toFixed(2)+'%</span>';}
function medal(i){return i===0?"🥇":(i===1?"🥈":(i===2?"🥉":""));}

/* ── 盤中資料:沿用主系統 /api/state,榜單於前端計算 ── */
function liveRank(d){
  var rows=(d.stocks||[]).map(function(s){
    return {code:s.code,name:s.name,sector:s.sector,close:s.price,chg:s.change_rate,
            vr:s.volume_ratio,tnvr:s.tnvr||s.volume_ratio,
            at_high:(s.rules||[]).indexOf("突破今高")>=0?1:0,
            heat:Math.round(Math.abs(s.change_rate||0)*3+(s.volume_ratio||0)*4+(s.ai_score||0)/5)};
  });
  function top(k,asc){var r=rows.slice().sort(function(a,b){return asc?a[k]-b[k]:b[k]-a[k]});return r.slice(0,10);}
  return {date:(d.market||{}).time||"盤中", hot:top("heat"), gainers:top("chg"),
          losers:top("chg",true), volume:top("tnvr"),
          newhigh:rows.filter(function(x){return x.at_high}).sort(function(a,b){return b.chg-a.chg}).slice(0,10),
          sectors:(d.sectors||[]).map(function(s){return {sector:s.name,pct:s.pct,quadrant:s.locked?"鎖定":"",flow:s.flow_score}}),
          signals:null, n:rows.length};
}

function renderCards(data){
  var secs=data.sectors||[], h="";
  secs.slice(0,8).forEach(function(s,i){
    var q = s.quadrant||"";
    var qn = {"in_up":"流入↗漲","in_down":"⚠邊拉邊賣","out_down":"流出·休息","out_up":"量縮漲","鎖定":"🔒 鎖定"}[q]||q;
    h+='<div class="card'+(i===0?" first":"")+'">'
      +'<span class="rk">'+(i+1)+'</span>'
      +'<div class="nm'+(i===0?" first":"")+'">'+esc(s.sector)+'</div>'
      +'<div class="lab">1日績效</div>'
      +'<div class="pf '+((s.pct||0)>=0?"up":"down")+' mono">'+((s.pct||0)>0?"+":"")+(s.pct||0).toFixed(2)+'%</div>'
      +'<div class="quad">'+esc(qn)+'</div></div>';
  });
  document.getElementById("cards").innerHTML = h || '<div class="note" style="width:100%">尚無族群資料</div>';
}

function renderList(data){
  var rows = data[TAB]||[];
  document.getElementById("c4h").textContent = TAB==="volume"?"量比":(MODE==="eod"?"熱度·隔日":"熱度");
  var h="";
  rows.forEach(function(r,i){
    var lb = "";
    if(MODE==="eod" && r.label!=null)
      lb = '<span class="win '+(r.label?"ok":"no")+'">隔日'+(r.label?"✓漲":"✗跌")+'</span>';
    h+='<div class="row">'
      +'<div class="c1"><div class="nm"><span class="medal">'+medal(i)+'</span>'+esc(r.name)
      +'<span class="tag '+(ENGINE[r.code]?"engine":"attack")+'">'+esc(r.sector)+'</span></div>'
      +'<div class="cd">'+esc(r.code)+'</div></div>'
      +'<div class="c2 mono '+((r.chg||0)>=0?"up":"down")+'">'+(r.close!=null?r.close:"—")+'</div>'
      +'<div class="c3">'+pct(r.chg)+'</div>'
      +'<div class="c4 mono">'+(TAB==="volume"?(r.tnvr||0).toFixed(2):Math.round(r.heat||0))+lb+'</div>'
      +'</div>';
  });
  document.getElementById("list").innerHTML = h ||
    '<div class="note">'+ (MODE==="eod"
      ? "尚無盤後資料。收盤後 15:05 EOD 管線產出當日榜單;若仍為空,請看 reports/EOD_QA 報告的 QA 異常項。"
      : "盤中資料載入中或非交易時段。") + '</div>';
  var sig = data.signals;
  document.getElementById("sigline").innerHTML = sig
    ? "當日訊號 <b>"+(sig.total||0)+"</b>|進場 <b>"+(sig.buys||0)+"</b>|風險 <b>"+(sig.risks||0)+"</b>|樣本 "+data.n+" 檔"
    : (MODE==="live"?"盤中即時計算·每30秒更新":"");
}

function refresh(){
  if(MODE==="live"){
    fetch("/api/state").then(function(r){return r.json()}).then(function(d){
      if(d.status==="starting"||!d.stocks){document.getElementById("list").innerHTML='<div class="note">引擎啟動中…</div>';return;}
      live = liveRank(d);
      document.getElementById("upd").textContent = "盤中 "+(live.date||"");
      renderCards(live); renderList(live);
    }).catch(function(){document.getElementById("list").innerHTML='<div class="note">連線失敗</div>';});
  } else {
    fetch("/api/eod_rank").then(function(r){return r.json()}).then(function(d){
      eod = d;
      document.getElementById("upd").textContent = d.date ? ("盤後 "+d.date) : "盤後";
      if(!d.date){renderCards({sectors:[]});document.getElementById("list").innerHTML='<div class="note">'+esc(d.note||"尚無盤後資料")+'</div>';return;}
      renderCards(d); renderList(d);
    }).catch(function(){document.getElementById("list").innerHTML='<div class="note">連線失敗</div>';});
  }
}

document.querySelectorAll(".seg span").forEach(function(b){
  b.onclick=function(){document.querySelectorAll(".seg span").forEach(function(x){x.classList.remove("on")});
    this.classList.add("on"); MODE=this.getAttribute("data-m"); refresh();};
});
document.querySelectorAll(".tab").forEach(function(b){
  b.onclick=function(){document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on")});
    this.classList.add("on"); TAB=this.getAttribute("data-t");
    renderList(MODE==="live"?(live||{}):(eod||{}));};
});
setInterval(function(){if(MODE==="live")refresh();},30000);
refresh();
</script>
</body>
</html>
