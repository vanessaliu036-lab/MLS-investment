<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>MLS · 盤中決策</title>
<style>
  :root{
    color-scheme:light;
    --bg:#fcfcfd;--card:#ffffff;--soft:#f4f5f8;--line:#edeff3;
    --ink:#0e1116;--sub:#6b7280;--faint:#aeb4bf;
    --up:#f43f5e;--up-soft:#fff1f3;--down:#10b981;--down-soft:#ecfdf5;
    --amber:#f59e0b;--amber-soft:#fffbeb;--violet:#6366f1;--violet-soft:#f0f1fe;
    --in:#2563c7;--in-soft:#eef3fc;--out:#e07b2e;--out-soft:#fdf3e9;
    --shadow:0 1px 3px rgba(15,18,25,.04),0 8px 24px rgba(15,18,25,.06);
    --shadow-lg:0 12px 40px rgba(15,18,25,.12);--r:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:#fcfcfd !important;color:#0e1116 !important}
  body{font-family:-apple-system,"SF Pro Text","PingFang TC","Noto Sans TC","Segoe UI",sans-serif;font-size:14px;line-height:1.5;padding-bottom:40px;letter-spacing:-.01em;max-width:640px;margin:0 auto}
  @media (prefers-color-scheme:dark){html,body{background:#fcfcfd !important;color:#0e1116 !important}}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .up{color:var(--up)}.down{color:var(--down)}.in{color:var(--in)}.out{color:var(--out)}

  /* 頂部 */
  .top{position:sticky;top:0;z-index:40;background:rgba(252,252,253,.86);backdrop-filter:saturate(1.4) blur(16px);padding:14px 18px 10px;border-bottom:1px solid var(--line)}
  .top-r1{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .logo{font-size:17px;font-weight:750;letter-spacing:-.02em}
  .logo .live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--down);margin-left:8px}
  .live .d{width:7px;height:7px;border-radius:50%;background:var(--down);animation:pl 1.8s infinite}
  @keyframes pl{0%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}70%{box-shadow:0 0 0 6px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
  .clock{margin-left:auto;font-size:13px;font-weight:700;color:var(--sub)}
  .idxrow{display:flex;gap:18px;overflow-x:auto;scrollbar-width:none}
  .idxrow::-webkit-scrollbar{display:none}
  .idx{flex:none}.idx .k{font-size:10.5px;color:var(--faint);font-weight:600}.idx .v{font-size:15px;font-weight:750}.idx .c{font-size:11px;font-weight:700}

  /* 分頁按鈕列(插件入口) */
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:10px 18px;scrollbar-width:none;background:var(--bg);position:sticky;top:0;z-index:30}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:none;font-size:13px;font-weight:700;padding:8px 15px;border-radius:100px;background:var(--card);color:var(--sub);border:1px solid var(--line);cursor:pointer;transition:.12s;white-space:nowrap}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tab .ic{margin-right:4px}

  .wrap{padding:18px}
  .sec{margin-bottom:24px}
  .sec-h{display:flex;align-items:baseline;gap:8px;margin:0 4px 12px}
  .sec-t{font-size:19px;font-weight:750;letter-spacing:-.02em}
  .sec-s{font-size:12px;color:var(--faint);font-weight:600}
  .sec-x{margin-left:auto;font-size:12px;color:var(--faint);font-weight:600}

  /* 一句話結論 */
  .verdict{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:18px}
  .verdict .lead{font-size:12px;font-weight:700;color:var(--violet);margin-bottom:6px}
  .verdict .big{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1.3}
  .verdict .big em{font-style:normal;color:var(--up)}
  .verdict .sub{font-size:13px;color:var(--sub);margin-top:8px;font-weight:500;line-height:1.6}
  .verdict .banner-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line)}
  .verdict .mode-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:-.01em}
  .mode-chip.attack{background:var(--up-soft);color:var(--up)}
  .mode-chip.caution{background:var(--amber-soft);color:var(--amber)}
  .mode-chip.risk{background:var(--soft);color:var(--sub)}
  .mode-chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
  .verdict .strategy-chip{background:var(--violet-soft);color:var(--violet);padding:5px 11px;border-radius:100px;font-size:12px;font-weight:700}
  .verdict .pick-line{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
  .verdict .pick{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;font-size:13px;font-weight:700;background:var(--card);border:1px solid var(--line)}
  .verdict .pick.main{background:var(--up-soft);border-color:var(--up);color:var(--up)}
  .verdict .pick.sub{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}
  .verdict .pick .k{font-size:10.5px;color:var(--faint);font-weight:600}

  /* v2.5:正方形熱力圖(10 群組固定 5×2 grid) */
  .heat-mode{display:flex;gap:6px;margin:0 4px 10px}
  .heat-mode b{font-size:12px;font-weight:700;padding:6px 13px;border-radius:100px;background:var(--card);border:1px solid var(--line);color:var(--sub);cursor:pointer}
  .heat-mode b.on{background:var(--violet);color:#fff;border-color:var(--violet)}
  #tree{position:relative;width:100%;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(2,1fr);gap:6px;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);background:var(--card);padding:6px;aspect-ratio:5/2}
  .cell{position:relative;overflow:hidden;cursor:pointer;border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:6px;transition:filter .1s;aspect-ratio:1/1;min-height:96px}
  .cell:active{filter:brightness(1.05)}
  .cell.sel{outline:3px solid var(--violet);outline-offset:-3px;z-index:5}
  .cell .cn{font-weight:800;line-height:1.15;color:#0e1116;font-size:15px;letter-spacing:-.01em}
  .cell .cv{font-weight:750;line-height:1.2;margin-top:3px;color:#0e1116;opacity:.85;font-size:13px}
  .cell .lk{position:absolute;top:4px;right:5px;font-size:9px;background:var(--violet);color:#fff;padding:1px 6px;border-radius:5px;font-weight:800;letter-spacing:.02em}
  .cell .rank{position:absolute;top:4px;left:5px;font-size:9px;background:rgba(255,255,255,.85);color:#0e1116;padding:1px 6px;border-radius:5px;font-weight:800}
  .cell.placeholder{background:repeating-linear-gradient(45deg,#fafbfc,#fafbfc 6px,#f1f3f6 6px,#f1f3f6 12px)!important;color:var(--faint)!important;cursor:default;opacity:.85}
  .cell.placeholder .rank{background:rgba(255,255,255,.7)}
  .legend{display:flex;align-items:center;gap:0;margin:10px 4px 2px}
  .legend .grad{flex:1;height:7px;border-radius:100px;background:linear-gradient(90deg,#f43f5e,#f79aa8,#fbd0d6,#eef0f3,#bfe8d5,#6bcfa0,#10b981)}
  .legend-l{display:flex;justify-content:space-between;margin:3px 4px 0;font-size:9.5px;color:var(--faint);font-weight:600}

  /* 展開個股 */
  .drill{margin-top:14px}
  .drill-h{display:flex;align-items:center;gap:8px;margin:0 4px 10px}
  .drill-h .dt{font-size:15px;font-weight:750}
  .drill-h .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px}
  .badge.in{background:var(--in-soft);color:var(--in)}.badge.out{background:var(--out-soft);color:var(--out)}
  .badge.act{background:var(--violet-soft);color:var(--violet)}
  .drill-h .cnt{margin-left:auto;font-size:12px;color:var(--faint);font-weight:600}

  /* v3:反攻候選名單 — 決策卡 */
  .decision-tabs{display:flex;gap:6px;margin:0 4px 12px;flex-wrap:wrap}
  .decision-tabs b{font-size:12px;font-weight:700;padding:6px 13px;border-radius:100px;background:var(--card);border:1px solid var(--line);color:var(--sub);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .decision-tabs b.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .dn{font-size:10.5px;font-weight:800;padding:1px 7px;border-radius:100px;background:var(--line);color:var(--sub);min-width:18px;text-align:center}
  .decision-tabs b.on .dn{background:rgba(255,255,255,.22);color:#fff}
  .dn-ready{background:var(--up-soft);color:var(--up)}
  .dn-watch{background:var(--violet-soft);color:var(--violet)}
  .dn-hold{background:var(--out-soft);color:var(--out)}

  .deccards{display:flex;flex-direction:column;gap:12px}
  .dec{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);border-left:4px solid var(--line);position:relative}
  .dec[data-state="Ready"]{border-left-color:var(--up)}
  .dec[data-state="Watch"]{border-left-color:var(--violet)}
  .dec[data-state="Hold"]{border-left-color:var(--out)}
  .dec[data-quad="unknown"]{border-left-color:var(--faint);background:repeating-linear-gradient(45deg,var(--card),var(--card) 8px,rgba(0,0,0,.015) 8px,rgba(0,0,0,.015) 16px)}
  .dec-h{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .dec-h .nm{font-size:16px;font-weight:750;letter-spacing:-.01em}
  .dec-h .cd{font-size:11.5px;font-weight:700;color:var(--faint);font-family:var(--mono);margin-left:-4px}
  .dec-h .sec-tg{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;background:var(--line);color:var(--sub)}
  .dec-h .st{font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:100px;letter-spacing:.02em}
  .dec-h .st.Ready{background:var(--up-soft);color:var(--up)}
  .dec-h .st.Watch{background:var(--violet-soft);color:var(--violet)}
  .dec-h .st.Hold{background:var(--out-soft);color:var(--out)}
  .dec-h .price{margin-left:auto;font-size:14px;font-weight:750;font-family:var(--mono)}
  .dec-h .chg{font-size:12.5px;font-weight:700;margin-left:6px;font-family:var(--mono)}
  .dec-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;padding:10px;background:var(--bg);border-radius:10px}
  .dec-m{margin:0;text-align:center;position:relative}
  .dec-m .lbl{font-size:10.5px;font-weight:700;color:var(--faint);margin-bottom:3px;letter-spacing:.03em;cursor:help;border-bottom:1px dotted var(--faint);display:inline-block;padding-bottom:1px}
  .dec-m .val{font-size:17px;font-weight:800;font-family:var(--mono)}
  .dec-m .val .pct{font-size:11px;font-weight:700;margin-left:2px}
  .dec-m .sub{font-size:10.5px;color:var(--sub);margin-top:2px}
  .dec-m .val.no-data{color:var(--faint);font-style:italic;font-size:13px}
  /* 展開區:為什麼是這個分數 */
  .dec-evidence{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
  .dec-evidence summary{cursor:pointer;font-size:11.5px;font-weight:700;color:var(--violet);list-style:none;display:inline-flex;align-items:center;gap:4px;padding:4px 0}
  .dec-evidence summary::before{content:"▸";transition:transform .12s;display:inline-block}
  .dec-evidence[open] summary::before{transform:rotate(90deg)}
  .dec-evidence summary::-webkit-details-marker{display:none}
  .dec-evidence .ev-body{font-size:12px;line-height:1.7;padding:8px 4px 2px}
  .dec-evidence .ev-row{display:flex;gap:8px;align-items:flex-start;padding:4px 0}
  .dec-evidence .ev-cat{flex:none;font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;background:var(--line);color:var(--sub);min-width:22px;text-align:center;font-family:var(--mono)}
  .dec-evidence .ev-cat.pos{background:var(--up-soft);color:var(--up)}
  .dec-evidence .ev-cat.neg{background:var(--out-soft);color:var(--out)}
  .dec-evidence .ev-cat.neu{background:var(--bg);color:var(--faint)}
  .dec-evidence .ev-why{color:var(--ink);font-weight:500}
  .dec-glossary{margin-top:14px;padding:12px 14px;background:var(--bg);border-radius:10px;font-size:11.5px;line-height:1.7;color:var(--sub)}
  .dec-glossary b{color:var(--ink);font-weight:750}
  .dec-glossary .gt{font-size:10.5px;font-weight:800;color:var(--faint);letter-spacing:.04em;display:block;margin:6px 0 4px}
  .dec-action{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.6;margin-bottom:10px;padding:8px 12px;background:var(--violet-soft);border-radius:8px}
  .dec-action.no-data{background:repeating-linear-gradient(45deg,var(--bg),var(--bg) 6px,rgba(0,0,0,.02) 6px,rgba(0,0,0,.02) 12px);color:var(--faint)}
  .dec-rows{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .dec-row{font-size:12px;line-height:1.55}
  .dec-row .k{font-size:10.5px;font-weight:700;color:var(--faint);margin-bottom:3px;letter-spacing:.03em;display:flex;align-items:center;gap:4px;cursor:help}
  .dec-row .k .hi{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:var(--line);color:var(--sub);font-size:9px;font-weight:800;font-family:var(--mono)}
  .dec-row .v{color:var(--ink);font-weight:600}
  .dec-row .v.trigger{color:var(--in)}
  .dec-row .v.invalidation{color:var(--out)}
  .dec-trade{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);font-size:11.5px;color:var(--sub);font-family:var(--mono)}
  .dec-trade span{flex:1}
  .dec-trade b{color:var(--ink);font-weight:750}
  @media (max-width:680px){
    .dec-metrics{grid-template-columns:repeat(2,1fr)}
    .dec-rows{grid-template-columns:1fr}
  }
  .stocks{display:flex;flex-direction:column;gap:9px}
  .stock{background:var(--card);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s;display:flex;align-items:center;gap:12px}
  .stock:active{transform:scale(.985)}
  .stock .stripe{width:4px;align-self:stretch;border-radius:4px;background:var(--faint);min-height:30px}
  .stock.buy .stripe{background:var(--up)}.stock.sell .stripe{background:var(--down)}.stock.watch .stripe{background:var(--amber)}
  .stock .sway{flex:1;min-width:0}
  .stock .snm{font-size:16px;font-weight:750;display:flex;align-items:center;gap:6px}
  .stock .snm .at{font-size:10px;font-weight:800;padding:1px 7px;border-radius:100px}
  .at.buy{background:var(--up-soft);color:var(--up)}.at.sell{background:var(--down-soft);color:var(--down)}.at.watch{background:var(--amber-soft);color:var(--amber)}
  .stock .sid{font-size:11px;color:var(--faint);font-weight:600;margin-top:2px}
  .stock .smeta{font-size:10.5px;color:var(--ink2);font-weight:500;margin-top:3px;line-height:1.45}
  .stock .sright{text-align:right;flex:none}
  .stock .sprice{font-size:16px;font-weight:750}
  .stock .spct{font-size:12px;font-weight:700}
  .stock .conf{font-size:11px;font-weight:800;padding:4px 9px;border-radius:100px;background:var(--violet-soft);color:var(--violet);flex:none}
  .empty{padding:26px;text-align:center;color:var(--faint);background:var(--card);border-radius:var(--r);font-weight:600;box-shadow:var(--shadow);font-size:13px;line-height:1.7}

  /* 個股細節 · 第二層(分時/走勢/籌碼tab + 走勢小圖 placeholder) */
  .sh-l2{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px}
  .l2-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
  .l2-tabs::-webkit-scrollbar{display:none}
  .l2-tabs b{flex:none;font-size:12px;font-weight:700;padding:6px 12px;border-radius:100px;background:var(--soft);color:var(--sub);cursor:pointer;border:1px solid transparent;transition:.12s;white-space:nowrap}
  .l2-tabs b.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .spark{width:100%;height:110px;background:var(--soft);border-radius:12px;position:relative;overflow:hidden}
  .spark svg{width:100%;height:100%;display:block}
  .spark .ph-label{position:absolute;top:8px;left:10px;font-size:10.5px;font-weight:700;color:var(--faint);background:rgba(255,255,255,.7);padding:2px 7px;border-radius:6px}
  .l2-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .l2-cell{background:var(--soft);padding:11px 12px;border-radius:10px}
  .l2-cell .k{font-size:10.5px;color:var(--faint);font-weight:700;margin-bottom:4px}
  .l2-cell .v{font-size:15px;font-weight:750}
  .l2-cell .v .sub{font-size:11px;color:var(--faint);font-weight:600;margin-left:4px}
  .l2-cell .v.up{color:var(--up)}.l2-cell .v.down{color:var(--down)}.l2-cell .v.neu{color:var(--faint)}
  .l2-chart{background:var(--soft);border-radius:10px;padding:12px;margin-bottom:10px}
  .l2-stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
  .ph-note{font-size:11px;color:var(--faint);font-weight:600;margin-top:10px;padding:8px 10px;background:var(--amber-soft);color:#92400e;border-radius:8px}

  /* 盤中資金流動(流入前三群組的個股;上進場下出場) */
  .flow-sec .flow-note{font-size:11.5px;color:var(--faint);font-weight:600;margin:0 4px 12px}
  .flow-zone{margin-bottom:14px}
  .flow-zh{display:flex;align-items:center;gap:7px;margin:0 4px 9px}
  .flow-zh .fdot{width:9px;height:9px;border-radius:50%}
  .flow-zh.buy .fdot{background:var(--up)}.flow-zh.sell .fdot{background:var(--down)}
  .flow-zh .ft{font-size:14px;font-weight:750}
  .flow-zh .fc{margin-left:auto;font-size:11.5px;color:var(--faint);font-weight:600}
  .frow{background:var(--card);border-radius:14px;padding:12px 15px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:11px;margin-bottom:8px;transition:transform .1s}
  .frow:active{transform:scale(.985)}
  .frow .fstripe{width:4px;align-self:stretch;border-radius:4px;min-height:26px}
  .frow.buy .fstripe{background:var(--up)}.frow.sell .fstripe{background:var(--down)}
  .frow .fmain{flex:1;min-width:0}
  .frow .fnm{font-size:15px;font-weight:750}
  .frow .fsub{font-size:11px;color:var(--faint);font-weight:600;margin-top:2px}
  .frow .fchip{font-size:10.5px;color:var(--in);font-weight:600;margin-top:3px;line-height:1.5}
  .frow .fchip.neu{color:var(--faint);font-weight:500}
  .frow .fmeta{font-size:10px;color:var(--ink2);font-weight:500;margin-top:2px}
  .frow .fact{font-size:10px;font-weight:800;padding:1px 6px;border-radius:100px;margin-left:6px;vertical-align:middle}
  .frow .fflow{text-align:right;flex:none}
  .frow .fflow .fv{font-size:15px;font-weight:800}
  .frow .fflow .fk{font-size:10px;color:var(--faint);font-weight:600}
  .frow .fpx{text-align:right;flex:none;min-width:66px}
  .frow .fpx .v{font-size:15px;font-weight:750}
  .frow .fpx .c{font-size:11px;font-weight:700}

  /* 速覽 */
  .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .mini{background:var(--card);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow)}
  .mini .mk{font-size:11px;color:var(--faint);font-weight:600;margin-bottom:8px}
  .mini .mrow{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
  .mini .mrow .nm{font-weight:650}.mini .mrow .v{font-weight:750}
  .acc-big{display:flex;gap:8px;text-align:center}.acc-big .c{flex:1}
  .acc-big .cv{font-size:20px;font-weight:800;color:var(--violet)}.acc-big .ck{font-size:10px;color:var(--faint);font-weight:600}

  /* 插件分頁內容 */
  .plugin-body{padding:18px}
  .plugin-card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
  .plugin-card h3{font-size:16px;font-weight:750;margin-bottom:6px}

<script>
var API_BASE="";  /* 空字串=同源(透過 Vercel serverless function /api/[...path].js 反代到 VPS 104.156.239.83:8000)。切回 VPS 直連時改回 "http://104.156.239.83",但需 VPS HTTPS。 */
var STATE=null, HEAT="change", SEL=null, TAB="home";
var ENGINE={"2303":1,"5347":1};
var QN={"in_up":"流入·漲","in_down":"⚠流入·跌 邊拉邊賣","out_up":"流出·漲 惜售","out_down":"流出·跌 休息"};
/* action 全 6 值對應:UI 顯示文字 + CSS class(預設:buy=buy, sell=sell, obs=obs, watch_buy/watch=watch, watch_exit/hold=hold) */
var ACTION_LABEL={buy:"進場",sell:"出場",obs:"僅觀察",watch:"高潛力",watch_buy:"觀察進場",watch_exit:"觀察出場",hold:"續抱"};
var ACTION_CSS={buy:"buy",sell:"sell",obs:"obs",watch:"watch",watch_buy:"watch",watch_exit:"hold",hold:"hold"};
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function pf(v){if(v==null)return"—";return (v>0?"+":"")+Number(v).toFixed(2)+"%";}
function col(v){return (v||0)>=0?"var(--up)":"var(--down)";}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast show";clearTimeout(t._tm);t._tm=setTimeout(function(){t.className="toast";},1600);}

/* treemap */
function colorChange(p){if(p==null)return"#eef0f3";var s=[[3,"#f43f5e"],[1,"#f77e8b"],[.01,"#fbd0d6"],[-.01,"#eef0f3"],[-1,"#bfe8d5"],[-3,"#6bcfa0"],[-99,"#10b981"]];for(var i=0;i<s.length;i++)if(p>=s[i][0])return s[i][1];return"#10b981";}
function colorFlow(f){if(f==null)return"#eef0f3";if(f>=15)return"#f43f5e";if(f>=5)return"#f77e8b";if(f>=.5)return"#fbd0d6";if(f>-.5)return"#eef0f3";if(f>-5)return"#bfe8d5";if(f>-15)return"#6bcfa0";return"#10b981";}
function treemap(items,W,H){
  var total=items.reduce(function(a,b){return a+Math.max(.001,b.weight)},0);
  var data=items.map(function(it){return {it:it,area:Math.max(.001,it.weight)/total*W*H}}).sort(function(a,b){return b.area-a.area});
  var rects=[],X=0,Y=0,W2=W,H2=H;
  function worst(row,len){if(!row.length)return Infinity;var s=0,mx=0,mn=Infinity;row.forEach(function(r){s+=r.area;if(r.area>mx)mx=r.area;if(r.area<mn)mn=r.area});var l2=len*len,s2=s*s;return Math.max(l2*mx/s2,s2/(l2*mn));}
  function place(row){var s=0;row.forEach(function(r){s+=r.area});var horiz=W2>=H2,len=horiz?H2:W2,thick=s/len,off=0;row.forEach(function(r){var side=r.area/thick;if(horiz)rects.push({it:r.it,x:X,y:Y+off,w:thick,h:side});else rects.push({it:r.it,x:X+off,y:Y,w:side,h:thick});off+=side});if(horiz){X+=thick;W2-=thick}else{Y+=thick;H2-=thick}}
  var i=0;while(i<data.length){var row=[data[i]],len=Math.min(W2,H2);while(i+1<data.length){if(worst(row.concat([data[i+1]]),len)<=worst(row,len)){row.push(data[i+1]);i++}else break;}place(row);i++;}
  return rects;
}
function secWeight(s){return (s.amount_100m!=null&&s.amount_100m>0)?s.amount_100m:Math.max(1,Math.abs(s.pct||0)+1);}

function renderTop(){
  var m=(STATE.market||{});
  var h='<div class="idx"><div class="k">加權指數</div><div class="v num" style="color:'+col(m.index_pct)+'">'+(m.index!=null?Number(m.index).toLocaleString():"—")+'</div><div class="c" style="color:'+col(m.index_pct)+'">'+pf(m.index_pct)+'</div></div>'
    +'<div class="idx"><div class="k">成交金額</div><div class="v num">'+(m.amount_100m!=null?m.amount_100m+"億":"—")+'</div><div class="c" style="color:var(--faint)">觀察池 '+((STATE.stocks||[]).length)+' 檔</div></div>'
    +'<div class="idx"><div class="k">市場強度</div><div class="v num" style="color:var(--violet)">'+(m.score!=null?m.score:"—")+'</div><div class="c" style="color:var(--faint)">'+(m.mode==="attack"?"攻擊":m.mode==="caution"?"謹慎":"防守")+'</div></div>';
  document.getElementById("idxrow").innerHTML=h;
  document.getElementById("clock").textContent=(m.time||"--:--:--");
  document.getElementById("livetxt").textContent=(STATE.is_market_hours===false?"盤後":"盤中");
}
function renderVerdict(){
  var m=(STATE.market||{});
  var secs=(STATE.sectors||[]).slice().sort(function(a,b){return (b.flow_score||0)-(a.flow_score||0)});
  var top3=secs.filter(function(s){return s.type==="attack"&&s.flow_score>0}).slice(0,3);
  var locked=(STATE.locked_sectors||[]);
  var lead=top3.length?('今日主攻 <em>'+esc(top3[0].name)+'</em>'):'今日無明確主攻族群';
  var sub=top3.length?('資金流入前三:'+top3.map(function(s){return esc(s.name)}).join("、")+'。'):'資金分散,偏防守觀望。';
  if(locked.length)sub+=' 鎖定:'+locked.map(esc).join("、")+'。';

  // 模式 chip
  var mode=m.mode==="attack"?"attack":m.mode==="caution"?"caution":"risk";
  var modeLabel=m.mode==="attack"?"攻擊模式":m.mode==="caution"?"謹慎模式":"防守模式";
  var scoreLabel=m.score!=null?(m.score+" 分 · 市場強度"):"市場強度計算中";

  // 主做 / 次做（取 locked 第一第二個；locked 空就用 flow_score 前二）
  var mainSec=(locked[0])||(top3[0]&&top3[0].name)||"";
  var subSec=(locked[1])||(top3[1]&&top3[1].name)||"";

  var picksHtml="";
  if(mainSec){
    picksHtml+='<span class="pick main"><span class="k">主做</span>'+esc(mainSec)+'</span>';
  }
  if(subSec){
    picksHtml+='<span class="pick sub"><span class="k">次做</span>'+esc(subSec)+'</span>';
  }

  document.getElementById("verdict").innerHTML=
    '<div class="lead">今日盤面結論</div>'
    +'<div class="big">'+lead+'</div>'
    +'<div class="sub">'+sub+'</div>'
    +'<div class="banner-row">'
      +'<span class="mode-chip '+mode+'"><span class="d"></span>'+modeLabel+'</span>'
      +'<span class="strategy-chip">'+scoreLabel+'</span>'
    +'</div>'
    +(picksHtml?('<div class="pick-line">'+picksHtml+'</div>'):'');
}
function renderTree(){
  document.getElementById("heat-upd").textContent="更新 "+((STATE.market||{}).time||"");
  /* v2.5:5×2 固定 grid,10 群組等大正方形
     · 排序:locked 優先 → 再依金額遞減
     · 顏色:HEAT=change(漲跌幅)/HEAT=flow(資金動能)
     · 缺資料的版位顯示「無資料」灰版
  */
  var allSecs=(STATE.sectors||[]).slice();
  /* v2.5.1:補位用 config.UNIVERSE(10 族群),只補 STATE 沒有的,去重 */
  var universeNames=["記憶體","封測","被動元件","PCB材料","功率半導體","石英元件","無人機","光通訊","ABF載板","晶圓材料"];
  function sortKey(s){
    var lockedW=s.locked?1e12:0;
    var amt=s.amount_100m!=null?s.amount_100m*1e6:0;
    return lockedW+amt;
  }
  var sorted=allSecs.slice().sort(function(a,b){return sortKey(b)-sortKey(a)});
  /* 補位:若 STATE sectors 不足 10,用 universeNames 補,但排除已存在的(去重) */
  var existing=new Set(sorted.map(function(s){return s.name}));
  universeNames.forEach(function(n){if(!existing.has(n)&&sorted.length<10){sorted.push({name:n,locked:false,pct:null,amount_100m:null,flow_score:null,_placeholder:true});}});
  var picked=sorted.slice(0,10);
  var tree=document.getElementById("tree"),html="";
  for(var i=0;i<10;i++){
    var s=picked[i];
    if(s){
      if(s._placeholder){
        html+='<div class="cell placeholder"><span class="rank">#'+(i+1)+'</span><div class="cn">'+esc(s.name)+'</div><div class="cv">無當日成交</div></div>';
        continue;
      }
      var c=HEAT==="change"?colorChange(s.pct):colorFlow(s.flow_score);
      // v2.6:HEAT=flow 顯示真實「主動淨流張數」,不再把成交額誤當淨流入
      // 金額(amount_100m)僅用於面積權重(代表市場關注度),不再當作 inflow 標籤
      var val;
      if(HEAT==="change"){
        val=pf(s.pct);
      }else{
        var net=(s.health&&s.health.net_lots!=null)?s.health.net_lots:null;
        if(net==null){val="無流向";}
        else{var kn=Math.round(Math.abs(net)/1000);
          val=(net>=0?"+":"−")+kn+"k張";}
      }
      var lockLabel=s.locked?'<span class="lk">鎖</span>':"";
      html+='<div class="cell'+(SEL===s.name?" sel":"")+'" style="background:'+c+'" onclick="pick(\''+esc(s.name)+'\')">'
        +'<span class="rank">#'+(i+1)+'</span>'
        +lockLabel
        +'<div class="cn">'+esc(s.name)+'</div>'
        +'<div class="cv">'+val+'</div>'
      +'</div>';
    } else {
      html+='<div class="cell placeholder"><span class="rank">#'+(i+1)+'</span><div class="cn">—</div><div class="cv">無資料</div></div>';
    }
  }
  tree.innerHTML=html;
  renderDrill();
}

function stockCard(s){
  var act=s.action||"obs";

/* 盤中資金流動:只取流入前三群組的個股,上進場下出場 */
function renderFlow(){
  var secs=(STATE.sectors||[]).filter(function(s){return s.type==="attack"&&s.flow_score>0})
           .sort(function(a,b){return b.flow_score-a.flow_score}).slice(0,3);
  var names={};secs.forEach(function(s){names[s.name]=1;});
  document.getElementById("flow-note").textContent = secs.length
    ? ("範圍:"+secs.map(function(s){return s.name}).join("、")+" — 只看流入群組內個股")
    : "目前無資金流入群組(盤中資金流入前三才會出現個股)";
  var pool=(STATE.stocks||[]).filter(function(x){return names[x.sector]});
  var buys=pool.filter(function(x){return x.action==="buy"||x.action==="watch"||x.action==="watch_buy"}).sort(function(a,b){return (b.ai_score||0)-(a.ai_score||0)});
  var sells=pool.filter(function(x){return x.action==="sell"||x.action==="watch_exit"}).sort(function(a,b){return (a.change_rate||0)-(b.change_rate||0)});
  function frow(s,kind){
    var af=s.health?s.health.aflow_ratio:null;
    var h=s.health||{};
    var cp=s.chip||{};
    var act=ACTION_LABEL[s.action||"obs"]||s.action||"obs";
    // 第二行:籌碼摘要(法人/大戶/外資連買)
    var chipLine=[];
    if(cp.has_data!==false){
      if(cp.inst_net_20d_lots!=null)chipLine.push('法人'+(cp.inst_net_20d_lots>0?"買超":"賣超")+(cp.inst_net_20d_lots>0?"+":"")+cp.inst_net_20d_lots+"張");
      if(cp.inst_streak!=null&&cp.inst_streak>0)chipLine.push('外資連買 '+cp.inst_streak+' 日');
      if(cp.big_holder_pct!=null)chipLine.push('大戶 '+cp.big_holder_pct.toFixed(1)+'%'+(cp.big_holder_trend>0?" ▲":"")+(cp.big_holder_trend<0?" ▼":""));
    }
    if(chipLine.length===0)chipLine.push('籌碼待盤後更新');
    // 第三行:健康度象限 + 量比 + BS
    var meta=['量比 '+(s.volume_ratio!=null?s.volume_ratio.toFixed(2):"—"),(s.bs!=null?'BS '+s.bs+'%':null),QN[h.quadrant]||null,(s.suggested_stop!=null?'停損 '+s.suggested_stop:null)].filter(Boolean).join(' · ');
    return '<div class="frow '+kind+'" onclick="detail(\''+s.code+'\')"><div class="fstripe"></div>'
      +'<div class="fmain"><div class="fnm">'+esc(s.name)+'<span class="fact '+ACTION_CSS[s.action||"obs"]+'">'+act+'</span></div>'
      +'<div class="fsub">'+esc(s.code)+' · '+esc(s.sector)+' · AI '+(s.ai_score!=null?s.ai_score:"—")+'</div>'
      +'<div class="fchip '+(cp.has_data?"":"neu")+'">'+chipLine.join(" ｜ ")+'</div>'
      +'<div class="fmeta">'+meta+'</div></div>'
      +'<div class="fflow"><div class="fv '+(af>0?"in":af<0?"out":"")+'">'+(af!=null?((af>0?"+":"")+(af*100).toFixed(0)+"%"):"—")+'</div><div class="fk">主動淨流</div></div>'
      +'<div class="fpx"><div class="v num" style="color:'+col(s.change_rate)+'">'+(s.price!=null?s.price:"—")+'</div><div class="c num" style="color:'+col(s.change_rate)+'">'+pf(s.change_rate)+'</div></div></div>';
  }
  var h='<div class="flow-zone"><div class="flow-zh buy"><span class="fdot"></span><span class="ft">▲ 進場側(流入群組內)</span><span class="fc">'+buys.length+' 檔</span></div>'
    +(buys.length?buys.map(function(s){return frow(s,"buy")}).join(""):'<div class="empty">流入群組內暫無進場訊號</div>')+'</div>'
    +'<div class="flow-zone"><div class="flow-zh sell"><span class="fdot"></span><span class="ft">▼ 出場側</span><span class="fc">'+sells.length+' 檔</span></div>'
    +(sells.length?sells.map(function(s){return frow(s,"sell")}).join(""):'<div class="empty">流入群組內暫無出場訊號</div>')+'</div>';
  document.getElementById("flowbody").innerHTML=h;
}
function renderMini(){
  var allSecs=(STATE.sectors||[]);
  var secs=allSecs.filter(function(s){return s.flow_score>0}).sort(function(a,b){return b.flow_score-a.flow_score}).slice(0,3);
  if(secs.length){
    // v2.6:用 sector health 真實 net_lots(主動淨流張數)取代誤導的「+amount_100m 億」
    // 成交額 ≠ 淨流入;淨流入用主動買張 − 主動賣張(由 scoring.get_aflow 累計)
    document.getElementById("topflow").innerHTML=secs.map(function(s){
      var net=(s.health&&s.health.net_lots!=null)?s.health.net_lots:null;
      var label,cls;
      if(net==null){label="無流向";cls="neu";}
      else{

        '<div class="mrow"><span class="nm" style="color:var(--faint)">尚無族群資料</span></div>'

        +'<div class="mrow" style="color:var(--faint);font-size:11.5px;line-height:1.6;padding:6px 4px 0">'
        +'· '+allSecs.length+' 個族群都呈流出/中性<br>'
        +'· 大盤轉弱或族群輪動休息中<br>'
        +'· 這是常態,不是 bug</div>';
    }

    document.getElementById("donttouch").innerHTML=out.map(function(s){
      return '<div class="mrow"><span class="nm">'+esc(s.name)+'</span><span class="v down">禁追</span></div>';
    }).join("");

    if(allSecs.length===0){
      document.getElementById("donttouch").innerHTML=
        '<div class="mrow"><span class="nm" style="color:var(--faint)">尚無族群資料</span></div>';
    } else {

        '<div class="mrow"><span class="nm" style="color:var(--faint)">無明確禁區</span></div>'
        +'<div class="mrow" style="color:var(--faint);font-size:11.5px;line-height:1.6;padding:6px 4px 0">'
        +'· '+allSecs.length+' 個族群都未觸發「攻擊族群 + 資金流出或跌>2%」條件<br>'
        +'· 沒有可標的=沒有族群需要避開(好消息)</div>';
    }
  }
}

  return '<div class="sic-c"><div class="sic-k">'+k+'</div><div class="sic-v '+vCls+'">'+vStr+'</div></div>';
}
function _sicSigned(v, suffix){
  if(v==null)return "—";
  var sign = v>0?"+":"";
  return sign+v+(suffix||"");
}
function _sicDir(v){
  if(v==null)return "—";
  return v>0?'<span class="sic-v up">↑</span>':(v<0?'<span class="sic-v dn">↓</span>':'<span class="sic-v nm">→</span>');
}
function _renderSic(code){
  var body = document.getElementById("sic-body-"+code);

  if(_l2cache[code]){apply(_l2cache[code]);return;}
  fetch(API_BASE+"/api/stock_detail/"+encodeURIComponent(code))
    .then(function(r){return r.json()})
    .then(function(d){_l2cache[code]=d;apply(d);})
    .catch(function(e){if(load)load.textContent="載入失敗:"+(e&&e.message);});
}

      +_sicCell("KD", ind.kd_k!=null?Math.round(ind.kd_k):"—")

/* l2 切換:打 /api/stock_detail 拉一次(有 cache),然後依 pane 渲染 */
var _l2cache={};
function l2Switch(id,pane){
  var root=document.getElementById(id);
  if(!root)return;
  var tabs=root.querySelectorAll(".l2-tabs b");
  for(var i=0;i<tabs.length;i++)tabs[i].className=(tabs[i].getAttribute("data-pane")===pane?"on":"");
  var p=document.getElementById(id+"-pane");
  if(!p)return;
  var code=id.replace(/^l2-/,"");
  p.innerHTML='<span class="ph-label">載入中…</span>';
  var apply=function(d){
    p.innerHTML="";
    if(pane==="td"){p.innerHTML=_l2RenderTd(d);}
    else if(pane==="dk"){p.innerHTML=_l2RenderDk(d);}
    else if(pane==="chip"){p.innerHTML=_l2RenderChip(d);}
    else if(pane==="depth"){p.innerHTML=_l2RenderDepth(d);}
  };
  if(_l2cache[code]){apply(_l2cache[code]);return;}
  fetch(API_BASE+"/api/stock_detail/"+encodeURIComponent(code)).then(function(r){return r.json()}).then(function(d){_l2cache[code]=d;apply(d);}).catch(function(e){p.innerHTML='<span class="ph-label neu">載入失敗:'+(e&&e.message)+'</span>';});
}
function _l2SparkSvg(path,w,h,opts){
  opts=opts||{};var stroke=opts.stroke||"var(--up)",fill=opts.fill||"rgba(244,63,94,.08)";
  var max=Math.max.apply(null,path),min=Math.min.apply(null,path),rng=Math.max(1e-6,max-min);
  var step=(w-4)/(path.length-1),pts=path.map(function(v,i){var x=2+i*step,y=h-2-((v-min)/rng)*(h-4);return [x,y];});
  var dline=pts.map(function(p,i){return (i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1);}).join(" ");
  var darea=dline+" L "+(w-2).toFixed(1)+" "+(h-2).toFixed(1)+" L 2 "+(h-2).toFixed(1)+" Z";
  return '<svg viewBox="0 0 '+w+" "+h+'" preserveAspectRatio="none" style="width:100%;height:'+h+'px;display:block"><path d="'+darea+'" fill="'+fill+'"/><path d="'+dline+'" fill="none" stroke="'+stroke+'" stroke-width="1.5"/></svg>';
}
function _l2RenderTd(d){
  var snap=d.snapshot||{};
  var path=[];for(var i=0;i<30;i++){var t=snap.change_rate||0;path.push(snap.price||0+(i-15)*t*0.3);}
  return '<div class="l2-chart">' + _l2SparkSvg(path,300,90) + '</div>'
    +'<div class="l2-stat-row">'
    +l2s("開",snap.open)+l2s("高",snap.high,"up")+l2s("低",snap.low,"down")+l2s("均",snap.avg_price)
    +'</div>'
    +'<div class="ph-note">盤中分時需 tick stream · 示意走勢(以均價/開盤推算)</div>';
}
function _l2RenderDk(d){
  var kbars=d.kbars||[];
  if(!kbars.length)return '<div class="ph-label neu">無日K資料(可能非交易日或合約查無)</div>';
  var closes=kbars.map(function(k){return k.close;}).filter(function(v){return v!=null;});
  if(!closes.length)return '<div class="ph-label neu">K 資料不完整</div>';
  var last=closes[closes.length-1];
  return '<div class="l2-chart">' + _l2SparkSvg(closes,300,90) + '</div>'
    +'<div class="l2-stat-row">'
    +l2s("最新",last)+(kbars[kbars.length-1].ma20!=null?l2s("MA20",kbars[kbars.length-1].ma20):"")
    +(kbars[kbars.length-1].ma60!=null?l2s("MA60",kbars[kbars.length-1].ma60):"")
    +l2s("K線",kbars.length+" 根")
    +'</div>'
    +'<div class="ph-note">資料源:Shioaji kbar · MA20/MA60 即時算</div>';
}
function _l2RenderChip(d){
  var c=d.chips||{};
  var bs=d.buy_sell||{};
  if(!c.has_data && bs.bs_pct==null){
    return '<div class="ph-label neu">⚠ 籌碼無資料(FinMind token 未設 或 非交易時段) · 三角驗證此維度不計</div>';
  }
  return '<div class="l2-stat-row">'
    +(c.inst_net_20d_lots!=null?l2s("法人20日",(c.inst_net_20d_lots>0?"+":"")+c.inst_net_20d_lots+"張",(c.inst_net_20d_lots>=0?"up":"down")):l2s("法人20日","—","neu"))
    +(c.inst_streak!=null?l2s("外資連"+Math.abs(c.inst_streak)+"日",c.inst_streak>0?"買超":"賣超",c.inst_streak>0?"up":"down"):l2s("外資連買","—","neu"))
    +(c.big_holder_pct!=null?l2s("千張大戶",c.big_holder_pct.toFixed(1)+"%"+(c.big_holder_trend>0?" ▲":"")+(c.big_holder_trend<0?" ▼":""),c.big_holder_trend>0?"up":c.big_holder_trend<0?"down":"neu"):l2s("千張大戶","—","neu"))
    +(c.big_holder_trend!=null?l2s("大戶趨勢",(c.big_holder_trend>0?"+":"")+c.big_holder_trend.toFixed(2)+"pp",c.big_holder_trend>=0?"up":"down"):"")
    +(bs.bs_pct!=null?l2s("BS %",bs.bs_pct+"%",bs.bs_pct>=50?"up":"down"):l2s("BS %","—","neu"))
    +(bs.buy_volume_lots?l2s("外盤量",bs.buy_volume_lots+"張"):"")
    +(bs.sell_volume_lots?l2s("內盤量",bs.sell_volume_lots+"張","down"):"")
    +'</div>'
    +'<div class="ph-note">資料源:FinMind 法人/大戶持股 + Shioaji BS 累計</div>';
}
function _l2RenderDepth(d){
  return '<div class="ph-label neu">⚠ 五檔報價需 Shioaji bid/ask stream · 本機 API 不公開訂單簿,需開盤中訂閱</div>'

}
function l2s(k,v,cls){
  return '<div class="l2-cell"><div class="k">'+esc(k)+'</div><div class="v num '+(cls||"")+'">'+esc(v)+'</div></div>';

        +'<div style="font-weight:800;color:var(--ink);font-size:13px;margin-bottom:6px">📊 模型命中率驗證</div>'
        +'<div style="color:var(--faint);margin-bottom:6px">用過去快照統計健康分三組 + 四象限的隔日報酬率('+d.hit_rate.snapshots_n+' 個交易日,'+d.hit_rate.pairs_n+' 組配對)</div>'
        +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px">';
      function hrCell(name, st){
        if(!st||!st.n) return '<div style="opacity:0.6"><b>'+name+'</b>: 資料不足</div>';
        var wr = st.win_rate!=null?st.win_rate+'%':'—';
        var ar = st.avg_ret!=null?((st.avg_ret>=0?'+':'')+st.avg_ret+'%'):'—';
        var cls = st.avg_ret>0?'color:var(--up)':(st.avg_ret<0?'color:var(--out)':'color:var(--ink)');
        return '<div><b>'+name+'</b>: n='+st.n+' 勝率 '+wr+' 均報酬 <span style="'+cls+'">'+ar+'</span></div>';
      }
      hitHtml += hrCell('健康分≥65', h.high_ge_65);
      hitHtml += hrCell('50-64', h.mid_50_64);
      hitHtml += hrCell('<50', h.low_lt_50);
      hitHtml += '</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;font-size:11px;color:var(--faint)">'
        +'<div>in_up '+((q2.in_up&&q2.in_up.avg_ret!=null)?((q2.in_up.avg_ret>=0?'+':'')+q2.in_up.avg_ret+'%'):'—')+'</div>'
        +'<div>in_down '+((q2.in_down&&q2.in_down.avg_ret!=null)?((q2.in_down.avg_ret>=0?'+':'')+q2.in_down.avg_ret+'%'):'—')+'</div>'
        +'<div>out_up '+((q2.out_up&&q2.out_up.avg_ret!=null)?((q2.out_up.avg_ret>=0?'+':'')+q2.out_up.avg_ret+'%'):'—')+'</div>'
        +'<div>out_down '+((q2.out_down&&q2.out_down.avg_ret!=null)?((q2.out_down.avg_ret>=0?'+':'')+q2.out_down.avg_ret+'%'):'—')+'</div>'
        +'</div></div>';
    } else if (d.hit_rate && d.hit_rate.note) {
      hitHtml += '<div style="background:rgba(124,108,255,0.06);border:1px solid rgba(124,108,255,0.18);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--faint)">'
        +'📊 模型命中率驗證:'+esc(d.hit_rate.note)+'<br><span style="font-size:11px">→ 明天起每日 15:05 自動累積,連續 20-30 日可驗證模型預測力</span></div>';
    }

    /* ─── 3) 列表報告(每張決策卡) ─── */
    var cardsHtml = '<div style="font-weight:800;color:var(--ink);font-size:13px;margin:8px 0 10px">📋 個股健康度報告('+d.cards.length+' 檔 · 排序:Ready > Watch > Hold)</div>';
    d.cards.forEach(function(c){
      var dd = c.decision||{};
      var cs = (c.chip||{}).chip_score;
      var cs_score = cs && cs.score!=null ? cs.score : null;
      var cs_lvl = cs ? {big_buy:'主力大買',small_buy:'主力小買',neutral:'中性',small_sell:'小賣',big_sell:'大賣',no_data:'無資料'}[cs.level]||cs.level : '無資料';
      var cs_color = cs_score==null?'var(--faint)':(cs_score>=20?'var(--up)':(cs_score>=10?'var(--violet)':'var(--out)'));
      var hs = c.health_score!=null ? c.health_score : '—';
      var hs_color = hs==='—'?'var(--faint)':(hs>=65?'var(--up)':(hs>=50?'var(--violet)':'var(--out)'));
      var bd = c.health_v3_breakdown||{};
      var bd_text = bd.chip!=null ? ('資 '+(bd.fund!=null?bd.fund:0).toFixed(0)+' / 價 '+(bd.pv!=null?bd.pv:0).toFixed(0)+' / 族 '+(bd.sector!=null?bd.sector:0)+' / Chip '+(bd.chip!=null?bd.chip:0)) : '';
      var chg = c.change_rate!=null ? c.change_rate : 0;
      var chgCls = chg>=0?'up':'down';
      var chgStr = (chg>=0?'+':'')+chg.toFixed(2)+'%';
      var conf_color = (dd.confidence>=85)?'var(--up)':((dd.confidence>=65)?'var(--violet)':'var(--out)');
      var ai_color = (dd.ai_score>=75)?'var(--up)':((dd.ai_score>=55)?'var(--violet)':'var(--out)');

      cardsHtml += '<div style="background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px">';
      // header
      cardsHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap">'
        +'<div><b style="font-size:15px;color:var(--ink)">'+esc(c.name||c.code)+'</b>'
        +'<span style="color:var(--faint);font-size:11.5px;margin-left:6px">'+esc(c.code||'')+'</span>'
        +(c.sector?'<span style="background:rgba(124,108,255,0.15);color:var(--violet);padding:1px 8px;border-radius:100px;font-size:11px;margin-left:6px">'+esc(c.sector)+'</span>':'')
        +'<span style="background:var(--ink);color:#fff;padding:2px 10px;border-radius:100px;font-size:11px;margin-left:6px">'+esc(dd.state||"—")+'</span></div>'
        +'<div style="text-align:right">'
        +'<b style="font-size:15px;color:var(--ink)">'+esc(c.price!=null?c.price:"—")+'</b>'
        +'<span style="margin-left:8px;font-weight:700;color:'+(chg>=0?'var(--up)':'var(--out)')+'">'+chgStr+'</span>'
        +'</div></div>';

      // 5 欄 metrics
      cardsHtml += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px;font-size:11.5px">';
      cardsHtml += '<div style="text-align:center;padding:6px;background:rgba(255,255,255,0.04);border-radius:6px"><div style="color:var(--faint)">AI Score</div><div style="font-size:18px;font-weight:800;color:'+ai_color+'">'+esc(dd.ai_score!=null?dd.ai_score:"—")+'</div></div>';
      cardsHtml += '<div style="text-align:center;padding:6px;background:rgba(255,255,255,0.04);border-radius:6px"><div style="color:var(--faint)">信心</div><div style="font-size:18px;font-weight:800;color:'+conf_color+'">'+esc(dd.confidence!=null?dd.confidence:"—")+'%</div></div>';
      cardsHtml += '<div style="text-align:center;padding:6px;background:rgba(255,255,255,0.04);border-radius:6px"><div style="color:var(--faint)">象限</div><div style="font-size:13px;font-weight:700;color:var(--ink)">'+esc(c.label||"—")+'</div></div>';
      cardsHtml += '<div style="text-align:center;padding:6px;background:rgba(255,255,255,0.04);border-radius:6px"><div style="color:var(--faint)">Chip 分</div><div style="font-size:18px;font-weight:800;color:'+cs_color+'">'+(cs_score!=null?cs_score+'/25':'—')+'</div><div style="font-size:10px;color:var(--faint)">'+esc(cs_lvl)+'</div></div>';
      cardsHtml += '<div style="text-align:center;padding:6px;background:rgba(255,255,255,0.04);border-radius:6px"><div style="color:var(--faint)">健康分 v3</div><div style="font-size:18px;font-weight:800;color:'+hs_color+'">'+hs+'/100</div>'+(bd_text?'<div style="font-size:9.5px;color:var(--faint);margin-top:2px">'+esc(bd_text)+'</div>':'')+'</div>';
      cardsHtml += '</div>';

      // Chip 評語
      if(cs && cs.reason){
        cardsHtml += '<div style="font-size:11.5px;color:var(--violet);background:rgba(124,108,255,0.08);padding:6px 10px;border-radius:6px;margin-bottom:6px">📈 Chip 評語:'+esc(cs.reason)+'</div>';
      }

      // Action / Trigger / Invalidation
      cardsHtml += '<div style="font-size:12px;color:var(--ink);margin:6px 0"><b>▶ Action:</b> '+esc(dd.action||"—")+'</div>';
      cardsHtml += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11.5px">';
      cardsHtml += '<div style="padding:6px 8px;background:rgba(124,108,255,0.08);border-radius:6px"><b style="color:var(--violet)">觸發:</b> '+esc(dd.trigger||"—")+'</div>';
      cardsHtml += '<div style="padding:6px 8px;background:rgba(255,80,80,0.08);border-radius:6px"><b style="color:var(--out)">失效:</b> '+esc(dd.invalidation||"—")+'</div>';
      cardsHtml += '</div>';

      // 進場/停損/目標
      if(dd.entry||dd.stop||dd.target){
        cardsHtml += '<div style="display:flex;gap:12px;font-size:12px;margin-top:6px;color:var(--sub)">'
          +'<span>進場 <b style="color:var(--ink)">'+esc(dd.entry||"—")+'</b></span>'
          +'<span>停損 <b style="color:var(--out)">'+esc(dd.stop||"—")+'</b></span>'
          +'<span>目標 <b style="color:var(--up)">'+esc(dd.target||"—")+'</b></span>'
          +'</div>';
      }

      // 時間序列(若有)
      var ts = c.time_series||[];
      if(ts.length>=2){
        cardsHtml += '<details style="margin-top:6px"><summary style="cursor:pointer;font-size:11.5px;color:var(--violet);font-weight:700">📊 健康分時間序列(近 '+ts.length+' 日)</summary>';
        cardsHtml += '<div style="margin-top:4px;font-size:11px">';
        ts.forEach(function(p){
          var phs = p.health_score!=null?p.health_score:'—';
          var phsC = phs==='—'?'var(--faint)':(phs>=65?'var(--up)':(phs>=50?'var(--violet)':'var(--out)'));
          var pqL = {in_up:'健康',in_down:'假紅',out_up:'惜售',out_down:'休息',unknown:'未連線'};
          cardsHtml += '<div style="display:flex;justify-content:space-between;padding:3px 8px;border-bottom:1px dashed rgba(255,255,255,0.06)">'
            +'<span style="color:var(--faint);width:80px">'+esc(p.date||'')+'</span>'
            +'<span style="color:'+phsC+';font-weight:700;width:40px;text-align:right">'+phs+'</span>'
            +'<span style="flex:1;color:var(--ink)">'+esc(pqL[p.quadrant]||p.quadrant||'—')+'</span>'
            +'<span style="color:var(--faint)">當日 '+(p.change_rate!=null?((p.change_rate>=0?'+':'')+p.change_rate.toFixed(2)+'%'):'—')+'</span>'
            +'</div>';
        });
        cardsHtml += '</div></details>';
      }

      cardsHtml += '</div>';
    });

    // 名詞表
    cardsHtml += '<div style="margin-top:14px;padding:10px 12px;background:rgba(255,255,255,0.04);border-radius:8px;font-size:11.5px;line-height:1.7;color:var(--sub)">'
      +'<div style="font-weight:800;color:var(--ink);margin-bottom:4px">📖 名詞速查</div>'
      +'<b>象限</b>=資金流向×漲跌的交叉:<b>健康</b>=流入+漲(真攻擊)、<b>假紅</b>=流入+跌(主力邊拉邊賣)、<b>惜售</b>=流出+漲(量縮惜售)、<b>休息</b>=流出+跌(退潮)、<b>未連線</b>=tick 資料缺。<br>'
      +'<b>Chip 分</b>(0-25)=法人近20日買賣超張數:大買≥+5000張→25、小買+500~+5000→15、中性±500→10、小賣-5000~-500→5、大賣≤-5000→0;再依外資連買/連賣日數 ±3~±5。<br>'
      +'<b>健康分 v3</b>=資金流(0-50)+價量(0-20)+族群(0-5)+Chip(0-25),總分100。<b>時間序列</b>看健康度是延續還是反轉。<br>'
      +'<b>命中率驗證</b>=過去快照隔日報酬率,30 日後驗證模型預測力。<br>'
      +'<b>狀態</b>=<b>Ready</b>=現在可布局、<b>Watch</b>=等觸發、<b>Hold</b>=不進場。'
      +'</div>';

    box.innerHTML = quadHtml + hitHtml + cardsHtml;

    // 更新標題時間
    var updEl = document.getElementById('decisions-upd');
    if(updEl) updEl.textContent = '更新 '+((d.as_of||'')).slice(11,16);
  }).catch(function(e){
    document.getElementById('health-body').innerHTML='<div class="empty" style="padding:24px;color:var(--out)">連線失敗:'+esc(String(e))+'</div>';
  });
}

/* ── NEXORA 渲染 ── */
function renderNexora(){
  var body=document.getElementById("plugin-body");
  body.innerHTML='<div class="plugin-card"><h3>🧠 NEXORA 八層盤後報告</h3><p>資金流 / Money Quality / 市場結構 / 承接 / 賣壓來源 / Smart Money / 隔日機率 / 自我驗證,12 節完整報告。</p><div id="nexora-body" style="margin-top:14px">載入中…</div></div>';
  fetch(API_BASE+"/api/nexora").then(function(r){return r.json()}).then(function(d){
    var box=document.getElementById("nexora-body");
    if(!d||!d.report){
      var note=d&&d.note?d.note:"尚無報告";
      var why="";
      var hint="";
      if((d&&d.error)||!d){
        why="NEXORA 模組讀檔失敗(可能 reports/ 目錄權限問題)";
        hint="看 server.py /api/nexora 路由的 traceback";
      } else if(d.note&&d.note.indexOf("15:05")>=0){
        why="after_hours.run() 15:05 才會跑 NEXORA 報告管線,現在是盤中";
        hint="等 15:05 後再來,或手動觸發 after_hours.run()";
      } else {
        why="盤後報告尚未產出";
        hint="確認 after_hours 排程是否正常(看 server.log)";
      }
      box.innerHTML='<div class="empty" style="padding:24px 14px;line-height:1.8">'
        +'<div style="font-size:15px;font-weight:800;color:var(--ink)">尚無 NEXORA 盤後報告</div>'
        +'<div style="color:var(--faint);font-size:12.5px;margin-top:6px">'+esc(note)+'</div>'
        +'<div style="color:var(--faint);font-size:12px;margin-top:6px">'+why+'</div>'
        +'<div style="color:var(--violet);font-weight:700;font-size:12px;margin-top:10px">'+hint+'</div>'
        +'</div>';
      return;
    }
    // 簡單 markdown 渲染:標題/段落
    var md=d.report;
    var html=md.split("\n").map(function(line){
      if(/^# (.+)$/.test(line)) return '<h3 style="margin:14px 0 6px;font-size:15px;font-weight:800">'+esc(line.slice(2))+'</h3>';
      if(/^## (.+)$/.test(line)) return '<h4 style="margin:12px 0 4px;font-size:14px;font-weight:800;color:var(--violet)">'+esc(line.slice(3))+'</h4>';
      if(line.trim()==="") return "<br>";
      return '<div style="line-height:1.7;font-size:13px;color:var(--ink)">'+esc(line)+'</div>';
    }).join("");
    box.innerHTML='<div style="font-size:11.5px;color:var(--faint);margin-bottom:8px">檔案: '+esc(d.file||"—")+'</div><div style="background:var(--soft);padding:14px;border-radius:10px;line-height:1.7">'+html+'</div>';
  }).catch(function(e){
    document.getElementById("nexora-body").innerHTML='<div class="empty" style="padding:24px 14px;line-height:1.8">'
      +'<div style="font-size:15px;font-weight:800;color:var(--ink)">載入失敗</div>'
      +'<div style="color:var(--faint);font-size:12px;margin-top:6px">'+esc(e)+'</div>'
      +'</div>';
  });
}

/* ── 四大策略對比渲染 ── */
function renderStrategy(){
  var body=document.getElementById("plugin-body");
  body.innerHTML='<div class="plugin-card"><h3>🎯 四大策略對比</h3><p>文件原文四條件(MA20/乖離率/量>5日均/收>昨高 + 籌碼) vs 主系統 AI Score,A/B 對比每檔命中度。'+(simOn?'(模擬資料)':'(即時 STATE)')+'</p><div id="str-rows">載入中…</div></div>';
  fetch(API_BASE+"/api/strategy_compare").then(function(r){return r.json()}).then(function(d){
    var rows=d.rows||[];
    if(!rows.length){document.getElementById("str-rows").innerHTML='<div class="empty">觀察池尚無資料</div>';return;}
    var html='<div style="display:flex;gap:8px;margin:10px 4px;font-size:12px;color:var(--sub)"><span><b style="color:var(--up)">A=B</b> 雙強共識</span><span>·</span><span><b style="color:var(--in)">A&gt;B</b> AI 強</span><span>·</span><span><b style="color:var(--violet)">B&gt;A</b> 條件強</span></div>';
    html+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">';
    html+='<tr style="background:var(--soft);text-align:left"><th style="padding:8px 6px">股</th><th style="padding:8px 4px">AI</th><th style="padding:8px 4px">B分</th><th style="padding:8px 4px">命中</th><th style="padding:8px 4px">MA20</th><th style="padding:8px 4px">乖離</th><th style="padding:8px 4px">量>5</th><th style="padding:8px 4px">收高</th><th style="padding:8px 4px">籌碼</th><th style="padding:8px 4px">BS</th><th style="padding:8px 4px">共識</th></tr>';
    rows.forEach(function(r){
      var yn=function(b){return b?'<span style="color:var(--up);font-weight:800">✓</span>':'<span style="color:var(--faint)">·</span>';};
      var agreeColor=r.agree==="A=B"?"var(--up)":(r.agree==="A>B"?"var(--in)":"var(--violet)");
      html+='<tr style="border-top:1px solid var(--line)">'
        +'<td style="padding:7px 6px"><b>'+esc(r.name||r.code)+'</b><br><small style="color:var(--faint)">'+esc(r.code)+'·'+esc(r.sector||"—")+'</small></td>'
        +'<td style="padding:7px 4px;font-weight:800">'+r.ai_score+'</td>'
        +'<td style="padding:7px 4px;font-weight:800;color:var(--violet)">'+r.doc_score+'</td>'
        +'<td style="padding:7px 4px;font-weight:800">'+r.doc_pass+'/5</td>'
        +'<td style="padding:7px 4px">'+yn(r.cond_ma20)+'</td>'
        +'<td style="padding:7px 4px">'+yn(r.cond_bias)+'</td>'
        +'<td style="padding:7px 4px">'+yn(r.cond_vol5)+'</td>'
        +'<td style="padding:7px 4px">'+yn(r.cond_high)+'</td>'
        +'<td style="padding:7px 4px">'+yn(r.cond_chip)+'</td>'
        +'<td style="padding:7px 4px;color:var(--sub)">'+(r.bs_mult!=null?r.bs_mult:'—')+'</td>'
        +'<td style="padding:7px 4px;font-weight:800;color:'+agreeColor+'">'+esc(r.agree)+'</td>'
        +'</tr>';
    });
    html+='</table></div>';

    // 如果全部都 A=B(同向共識)且 doc_pass 都很低,給統一說明
    const allLow=rows.every(r=>(r.doc_pass||0)<=2);
    const allAB=rows.every(r=>r.agree==="A=B");
    if(rows.length>0 && allLow && allAB){
      html+=`<div style="margin-top:14px;padding:12px 14px;background:var(--violet-soft);border-radius:12px;font-size:12.5px;color:var(--violet);line-height:1.7">
        <b>📋 為什麼 A=B 共識分都很低?</b><br>
        文件四大條件需要 4/5 命中才算「條件強」,AI 分數要 ≥ 70 才算「AI 強」。<br>
        目前 ${rows.length} 檔都低標 → 主系統跟文件策略都判定「不進場」。這是雙策略共識的「防守訊號」,不是 bug。
      </div>`;
    } else if(rows.length>0 && rows.filter(r=>r.doc_pass>=4).length===0 && rows.filter(r=>r.ai_score>=70).length===0){
      html+=`<div style="margin-top:14px;padding:12px 14px;background:var(--amber-soft);border-radius:12px;font-size:12.5px;color:var(--amber);line-height:1.7">
        <b>📋 目前沒有任何檔達到「進場標準」</b><br>
        · 文件條件命中 0/5 條件: ${rows.filter(r=>r.doc_pass===0).length} 檔<br>
        · AI Score ≥ 70: 0 檔<br>
        繼續觀察,等任一檔跨過門檻就會出現在表格頂部。
      </div>`;
    }
    document.getElementById("str-rows").innerHTML=html;
  }).catch(function(e){
    document.getElementById("str-rows").innerHTML='<div class="empty">載入失敗:'+esc(e)+'</div>';
  });
}

/* 模擬引擎(簡化:對現有 STATE 加雜訊,盤後測試用) */
var simOn=false,simTimer=null,simSpeed=1000;
function simStep(){
  if(!STATE||!STATE.stocks)return;
  STATE.stocks.forEach(function(s){s.change_rate=(s.change_rate||0)+(Math.random()-0.48)*0.4;if(s.price)s.price=Math.round(s.price*(1+(Math.random()-0.5)*0.006)*100)/100;s.volume_ratio=Math.max(0.3,(s.volume_ratio||1)+(Math.random()-0.5)*0.1);});
  (STATE.sectors||[]).forEach(function(g){g.pct=(g.pct||0)+(Math.random()-0.48)*0.3;g.flow_score=(g.flow_score||0)+(Math.random()-0.5)*2;});
  renderHome();var ss=document.getElementById("simstat");if(ss)ss.textContent="模擬中 · tick";
}
function toggleSim(){simOn=!simOn;var b=document.getElementById("playbtn");if(simOn){if(b)b.textContent="⏸ 暫停";simTimer=setInterval(simStep,simSpeed);toast("模擬開始");}else{if(b)b.textContent="▶ 開始模擬";clearInterval(simTimer);toast("暫停");}}
function stepSim(){simStep();toast("前進一步");}
function resetSim(){simOn=false;clearInterval(simTimer);var b=document.getElementById("playbtn");if(b)b.textContent="▶ 開始模擬";poll();toast("回到即時");}
function setSpeed(ms){simSpeed=ms;document.querySelectorAll(".spd b").forEach(function(x){x.className=(parseInt(x.getAttribute("data-s"),10)===ms?"on":"")});if(simOn){clearInterval(simTimer);simTimer=setInterval(simStep,simSpeed);}}

function renderHome(){
  /* 順序:頂部 → 結論 → 盤面速覽(資金流入前3 + 今日禁區)→ 熱力圖 → 決策卡 → 盤中流動 */
  var steps=[renderTop,renderVerdict,renderMini,renderTree,renderDecisions,renderFlow];
  for(var i=0;i<steps.length;i++){try{steps[i]();}catch(e){if(window.console)console.log("r",i,e&&e.message);}}
}

  html+='<b>信心</b> = AI 對自己判斷的把握,看證據支持/反對的比例。證據矛盾時會掉到 30-50%,AI 寧可說「不確定」也不要亂喊。<br>';
  html+='<b>象限</b> = 資金流向 × 漲跌的交叉。<b>健康</b>=流入+漲(真攻擊)、<b>假紅</b>=流入+跌(主力邊拉邊賣)、<b>惜售</b>=流出+漲(量縮惜售)、<b>休息</b>=流出+跌(退潮)、<b>未連線</b>=tick 資料缺。<br>';
  html+='<b>Chip 分</b>(0-25) = 法人近20日買賣超張數:大買≥+5000張→25、小買+500~+5000→15、中性±500→10、小賣-5000~-500→5、大賣≤-5000→0;再依外資連買/連賣日數 ±3~±5。<br>';
  html+='<b>健康分 v3</b> = 資金流(0-50)+ 價量(0-20)+ 族群(0-5)+ Chip(0-25),總分 100。<b>時間序列</b>顯示該股近 5 日健康分走勢,評估「健康度是延續還是反轉」。<br>';
  html+='<b>狀態</b> = <b>Ready</b>=現在可布局、<b>Watch</b>=等觸發條件達成、<b>Hold</b>=不進場。<br>';
  html+='<b>命中率驗證</b> = 用過去快照統計「健康分高/中/低 三組的隔日平均報酬」與「四象限的隔日平均報酬」,30 天後驗證模型預測力。<br>';
  html+='<b>觸發 / 失效</b> = 進場的條件句 vs 出場的條件句。看不到觸發別進場,碰到失效要出場。';
  html+='</div>';
  box.innerHTML=html;
  var upd=document.getElementById("decisions-upd");if(upd)upd.textContent="更新 "+((DEC_CACHE.as_of||"")).slice(11,16);
}
function loadDecisions(){
  var box=document.getElementById("decisions");
  if(box)box.innerHTML='<div class="empty" style="padding:30px;text-align:center;color:var(--faint)">載入決策卡…</div>';
  fetch(API_BASE+"/api/money_health").then(function(r){return r.json()}).then(function(d){
    if(d.error){box.innerHTML='<div class="empty" style="padding:30px;text-align:center;color:var(--out)">決策卡載入失敗:'+esc(d.error)+'</div>';return;}
    DEC_CACHE=d;renderDecisions();
  }).catch(function(e){box.innerHTML='<div class="empty" style="padding:30px;text-align:center;color:var(--out)">連線失敗</div>';});
}

function poll(){
  if(simOn)return;
  fetch(API_BASE+"/api/state").then(function(r){return r.json()}).then(function(d){
    if(d.status==="starting"){document.getElementById("tree").innerHTML='<div class="empty" style="height:100%;display:flex;align-items:center;justify-content:center">引擎啟動中…</div>';return;}
    STATE=d;renderHome();
  }).catch(function(){document.getElementById("tree").innerHTML='<div class="empty" style="height:100%;display:flex;align-items:center;justify-content:center">連線失敗</div>';});
  loadDecisions();
}
window.addEventListener("resize",function(){if(STATE&&TAB==="home")renderTree();});
setInterval(poll,30000);poll();
</script>
</body>
</html>
