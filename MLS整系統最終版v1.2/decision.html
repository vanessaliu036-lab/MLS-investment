<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLS 資金決策 v3.0 · 盤後決策中心</title>
<style>
  :root{
    --bg:#f4f1ea; --surface:#ffffff; --ink:#1a1d23; --ink2:#2a2e36;
    --line:#e2dccf; --gold:#8a6d1a; --goldbg:#f3ecd8;
    --up:#c0342c; --down:#1a8a5a;          /* 台股慣例:紅漲綠跌 */
    --flowin:#2f6bd0; --flowout:#e0662b;   /* 資金:藍流入 橙流出 */
    --ready:#c0342c; --watch:#e0662b; --hold:#2a2e36; --engine:#3550a0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);max-width:820px;margin:0 auto;
    font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    font-size:15px;padding-bottom:44px}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
  .bar{position:sticky;top:0;z-index:30;background:rgba(244,241,234,.97);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:11px 14px;display:flex;align-items:center;gap:10px}
  .bar .lg{font-weight:800;color:var(--gold);font-size:16px}
  .bar .sub{font-size:11.5px;color:var(--ink2)}
  .bar .rt{margin-left:auto;display:flex;gap:8px}
  .btn{font-size:12px;font-weight:700;padding:7px 12px;border-radius:9px;
    border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer}
  .btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
  .btn:active{filter:brightness(.96)}

  /* 命中率儀表(頁面簽名元素) */
  .dial{margin:12px 14px;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:16px;
    border-left:6px solid var(--gold)}
  .dial .big{font-size:34px;font-weight:800;color:var(--gold);line-height:1}
  .dial .big small{font-size:14px;font-weight:700}
  .dial .cap{font-size:11.5px;color:var(--ink2);margin-top:4px}
  .dial .side{margin-left:auto;text-align:right;font-size:12px;color:var(--ink2);line-height:1.8}
  .dial .side b{color:var(--ink);font-size:13px}

  .modeseg{display:flex;padding:2px 14px 4px}
  .modeseg .m{flex:1;text-align:center;padding:9px 4px;font-size:13px;font-weight:700;
    color:var(--ink2);border-bottom:2px solid transparent;cursor:pointer}
  .modeseg .m.on{color:var(--ink);border-bottom-color:var(--gold)}

  .wrap{padding:8px 12px}
  .note{padding:34px 20px;text-align:center;color:var(--ink2);font-size:13px;line-height:1.7}

  /* 觀察清單卡 */
  .wcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:11px 13px;margin-bottom:9px;border-left-width:6px}
  .wcard .top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .wcard .nm{font-size:15.5px;font-weight:800}
  .wcard .cd{font-size:10.5px;color:var(--ink2)}
  .wcard .sc{margin-left:auto;font-size:17px;font-weight:800;color:var(--gold)}
  .wcard .sc small{font-size:10px;font-weight:700;color:var(--ink2)}
  .tag{display:inline-block;font-size:10.5px;font-weight:800;color:#fff;
    padding:2px 8px;border-radius:6px}
  .wcard .meta{margin-top:5px;font-size:11.5px;color:var(--ink2);line-height:1.6}
  .wcard .trig{margin-top:5px;font-size:12px;font-weight:700}
  .wcard .trig b{color:var(--flowin)}
  .quad{font-weight:800}
  .quad.in_up{color:var(--up)} .quad.in_down{color:var(--flowin)}
  .quad.out_up{color:var(--flowout)} .quad.out_down{color:var(--down)}

  /* 驗證表 */
  table{width:100%;min-width:640px;border-collapse:collapse;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:12px}
  th{background:var(--goldbg);color:var(--gold);font-size:10.5px;font-weight:800;
    padding:7px 4px;text-align:center;white-space:nowrap}
  td{padding:7px 4px;text-align:center;border-top:1px solid var(--line);
    color:var(--ink);white-space:nowrap}
  td.l{text-align:left;padding-left:9px}
  td .nm{font-weight:800;font-size:12.5px}
  td .cd{font-size:10px;color:var(--ink2)}
  .pos{color:var(--up);font-weight:800}
  .neg{color:var(--down);font-weight:800}
  .ok{color:var(--up);font-weight:800}
  .no{color:var(--ink2);font-weight:700}
  .tbx{overflow-x:auto;border-radius:12px}

  /* 統計 */
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:10px}
  .stat h3{font-size:13px;color:var(--gold);font-weight:800;margin-bottom:8px}
  .srow{display:flex;align-items:center;gap:8px;padding:6px 0;
    border-top:1px solid var(--line);font-size:12.5px}
  .srow:first-of-type{border-top:none}
  .srow .k{font-weight:800;min-width:86px}
  .srow .hit{font-size:16px;font-weight:800;color:var(--gold);min-width:64px}
  .srow .rest{color:var(--ink2);font-size:11.5px;line-height:1.5}
  .bary{height:7px;border-radius:4px;background:var(--goldbg);flex:1;overflow:hidden}
  .bary i{display:block;height:100%;background:var(--gold)}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:10px;
    opacity:0;transition:opacity .25s;z-index:80;pointer-events:none}
  .toast.on{opacity:1}
  .disclaimer{padding:10px 16px 0;font-size:10.5px;color:var(--ink2);line-height:1.7}

  /* v2.3 盤面速覽 */
  .brief{display:flex;gap:8px;padding:2px 14px 8px;overflow-x:auto}
  .brief .b{background:var(--surface);border:1px solid var(--line);border-radius:10px;
    padding:7px 12px;min-width:100px;flex:1}
  .brief .b .s{font-size:11px;font-weight:800;color:var(--gold)}
  .brief .b .v{font-size:14px;font-weight:800;margin-top:2px}
  .brief .b .v.fin{color:var(--flowin)} .brief .b .v.fout{color:var(--flowout)}

  /* v2.3 個股資訊卡(彈層) */
  .mask{position:fixed;inset:0;background:rgba(26,29,35,.45);z-index:60;
    display:none;align-items:flex-end;justify-content:center}
  .mask.on{display:flex}
  .card{background:var(--bg);width:100%;max-width:820px;max-height:88vh;
    overflow-y:auto;border-radius:18px 18px 0 0;padding:14px 14px 30px}
  .card .chead{display:flex;align-items:baseline;gap:8px;padding-bottom:8px;
    border-bottom:2px solid var(--gold);position:sticky;top:-14px;
    background:var(--bg);z-index:5;padding-top:4px}
  .card .chead .nm{font-size:18px;font-weight:800}
  .card .chead .cd{font-size:11px;color:var(--ink2)}
  .card .chead .hp{margin-left:auto;font-size:22px;font-weight:800;color:var(--gold)}
  .card .chead .hp small{font-size:10.5px;color:var(--ink2);font-weight:700}
  .card .chead .x{font-size:20px;font-weight:800;color:var(--ink2);
    padding:0 4px;cursor:pointer;border:none;background:none}
  .cgrp{margin-top:12px}
  .cgrp h4{font-size:12px;font-weight:800;color:var(--gold);margin-bottom:6px}
  .cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .cgrid.g4{grid-template-columns:repeat(4,1fr)}
  .cell{background:var(--surface);border:1px solid var(--line);border-radius:9px;
    padding:7px 8px;text-align:center}
  .cell .k{font-size:10.5px;font-weight:700;color:var(--ink2)}
  .cell .v{font-size:13.5px;font-weight:800;margin-top:2px;word-break:keep-all;line-height:1.3}
  .cell .v.pos{color:var(--up)} .cell .v.neg{color:var(--down)}
  .cell .v.fin{color:var(--flowin)} .cell .v.fout{color:var(--flowout)}
  .rzn{background:var(--surface);border:1px solid var(--line);border-radius:9px;
    padding:9px 12px;font-size:12.5px;line-height:1.9;font-weight:700}
  .rzn .ok{color:var(--up)} .rzn .no{color:var(--ink2)}
  .cnote{font-size:10.5px;color:var(--ink2);margin-top:5px;line-height:1.6}
</style>
</head>
<body>

<div class="bar">
  <div>
    <div class="lg">🎯 MLS 資金決策 v3.0</div>
    <div class="sub" id="sub">觀察 → 驗證 → 決策 · 盤後決策中心</div>
  </div>
  <div class="rt">
    <button class="btn" id="refreshBtn">重整</button>
    <button class="btn gold" id="runBtn">跑盤後</button>
  </div>
</div>

<div class="dial" id="dial">
  <div>
    <div class="big" id="dialHit">—<small>%</small></div>
    <div class="cap">最近30天 Ready 命中率</div>
  </div>
  <div class="side" id="dialSide">樣本累積中</div>
</div>

<div class="brief" id="brief" style="display:none"></div>

<div class="modeseg">
  <div class="m on" data-mode="watch">隔日觀察清單</div>
  <div class="m" data-mode="verify">隔日驗證</div>
  <div class="m" data-mode="stats">勝率統計</div>
</div>

<div class="wrap" id="watch"><div class="note">載入中…</div></div>
<div class="wrap" id="verify" style="display:none"><div class="note">載入中…</div></div>
<div class="wrap" id="stats" style="display:none"><div class="note">載入中…</div></div>

<div class="disclaimer">象限與健康分為市場狀態的觀察結論,不是買賣訊號;籌碼以盤後法人資料蓋章,
盤中資金流出 ≠ 出貨。達標=隔日收盤 ≥ +0.3%;觸發=隔日突破觀察日高點。</div>

<div class="mask" id="mask"><div class="card" id="card"></div></div>

<div class="toast" id="toast"></div>

<script>
const GRADE_C={Ready:"var(--ready)",Watch:"var(--watch)",Hold:"var(--hold)","溫度計":"var(--engine)"};
function toast(m){const t=document.getElementById("toast");t.textContent=m;
  t.classList.add("on");setTimeout(()=>t.classList.remove("on"),1900);}
function pct(v,dec=2){if(v==null)return "—";
  const cls=v>=0?"pos":"neg";return `<span class="${cls}">${v>=0?"+":""}${v.toFixed(dec)}%</span>`;}
function lots(v){if(v==null)return "—";
  return `<span class="${v>=0?"fin":"fout"}">${v>=0?"+":""}${v.toLocaleString()}</span>`;}
function arrow(v){if(v==null)return "—";
  return `<span class="${v==="↑"?"pos":(v==="↓"?"neg":"")}">${v}</span>`;}

// ── v2.3 盤面速覽 ──
async function loadBrief(){
  try{
    const d=await (await fetch("/api/dec/brief")).json();
    const el=document.getElementById("brief");
    const top=d.top||[];
    if(!top.length){el.style.display="none";return;}
    el.style.display="";
    el.innerHTML=`<div class="b" style="min-width:74px;flex:0"><div class="s">資金流入<br>前三</div></div>`+
      top.map(t=>`<div class="b"><div class="s">${t.sector}${t.dir?" "+t.dir:""}</div>
        <div class="v ${t.dir==="↓"?"fout":"fin"}">${t.amount_yi}億</div></div>`).join("");
  }catch(e){/* 靜默 */}
}

// ── v2.3 個股資訊卡 ──
const mask=document.getElementById("mask");
mask.onclick=e=>{if(e.target===mask)mask.classList.remove("on");};
function cell(k,v){return `<div class="cell"><div class="k">${k}</div><div class="v">${v}</div></div>`;}
async function openCard(code,name){
  mask.classList.add("on");
  document.getElementById("card").innerHTML=
    `<div class="chead"><span class="nm">${name||code}</span><span class="cd">${code}</span>
     <button class="x" onclick="mask.classList.remove('on')">✕</button></div>
     <div class="note">載入中…</div>`;
  try{
    const c=await (await fetch("/api/dec/card?code="+encodeURIComponent(code))).json();
    if(c.error){document.getElementById("card").innerHTML+=`<div class="note">${c.error}</div>`;return;}
    const t=c.tech||{},f=c.flow||{},ch=c.chip||{},tr=c.trade||{},ai=c.ai||{};
    const ap=t.approx?"≈":"";
    document.getElementById("card").innerHTML=`
      <div class="chead"><span class="nm">${c.name}</span><span class="cd">${c.code} · ${c.sector}</span>
        <span class="hp">${c.health_score??"—"}<small> 健康度</small></span>
        <button class="x" onclick="mask.classList.remove('on')">✕</button></div>

      <div class="cgrp"><h4>籌碼面</h4><div class="cgrid g4">
        ${cell("外資",lots(ch.foreign))}${cell("投信",lots(ch.trust))}
        ${cell("自營",lots(ch.dealer))}${cell("主力",ch.main_force==null?"—":lots(ch.main_force))}
        ${cell("大戶持股",ch.big_holder_delta==null?"—":pct(ch.big_holder_delta,1))}
        ${cell("400張以上",ch.big400_delta==null?"—":pct(ch.big400_delta,1))}
        ${cell("千張大戶",ch.big1000_delta==null?"—":pct(ch.big1000_delta,1))}
        ${cell("級距分布",ch.main_force==null?"待接分點":"—")}
      </div><div class="cnote">${ch.period_note||""}</div></div>

      <div class="cgrp"><h4>資金</h4><div class="cgrid g4">
        ${cell("主動買",f.active_buy_pct==null?"—":`<span class="fin">${f.active_buy_pct}%</span>`)}
        ${cell("主動賣",f.active_sell_pct==null?"—":`<span class="fout">${f.active_sell_pct}%</span>`)}
        ${cell("5日資金流",arrow(f.flow_5d))}${cell("10日資金流",arrow(f.flow_10d))}
      </div></div>

      <div class="cgrp"><h4>技術${t.approx?"(≈ 低點補值近似)":""}</h4><div class="cgrid g4">
        ${cell("MA5",arrow(t.ma5))}${cell("MA10",arrow(t.ma10))}${cell("MA20",arrow(t.ma20))}
        ${cell("MACD",t.macd||"—")}
        ${cell("KD"+ap,t.kd_k==null?"—":`${t.kd_k}/${t.kd_d}`)}
        ${cell("RSI",t.rsi??"—")}${cell("ATR"+ap,t.atr??"—")}
        ${cell("等級",c.grade||"—")}
      </div></div>

      <div class="cgrp"><h4>交易</h4><div class="cgrid g4">
        ${cell("建議",tr.advice||"—")}${cell("買點",tr.buy??"—")}
        ${cell("停損",tr.stop??"—")}${cell("RR",tr.rr??"—")}
        ${cell("T1",tr.t1??"—")}${cell("T2",tr.t2??"—")}
        ${cell("停損距",tr.buy&&tr.stop?pct((tr.stop-tr.buy)/tr.buy*100,1):"—")}
        ${cell("T1距",tr.buy&&tr.t1?pct((tr.t1-tr.buy)/tr.buy*100,1):"—")}
      </div><div class="cnote">價位=ATR 結構(停損 −1.3×ATR / T1 +2×ATR / T2 +4×ATR),觸發=突破觀察日高。</div></div>

      <div class="cgrp"><h4>AI 結論${ai.pct!=null?` · ${ai.pct}%`:""}</h4>
        <div class="rzn">${(ai.reasons||[]).map(r=>
          `<div class="${r.startsWith("✓")?"ok":"no"}">${r}</div>`).join("")||"—"}</div>
      </div>`;
  }catch(e){document.getElementById("card").innerHTML+=`<div class="note">載入失敗:${e}</div>`;}
}

// ── 觀察清單 ──
async function loadWatch(){
  const el=document.getElementById("watch");
  try{
    const d=await (await fetch("/api/dec/watchlist")).json();
    document.getElementById("sub").textContent=
      `隔日觀察清單 · 目標日 ${d.target_date||"—"}`;
    const rows=d.rows||[];
    if(!rows.length){el.innerHTML='<div class="note">尚無清單。按右上「跑盤後」產出今日觀察名單。</div>';return;}
    el.innerHTML=rows.map(w=>`
      <div class="wcard" style="border-left-color:${GRADE_C[w.grade]||"var(--gold)"}"
           onclick="openCard('${w.code}','${w.name}')">
        <div class="top">
          <span class="tag" style="background:${GRADE_C[w.grade]}">${w.grade}</span>
          <span class="tag" style="background:${w.track==="engine"?"var(--engine)":"var(--flowout)"}">${w.track==="engine"?"引擎軌":"攻擊軌"}</span>
          <span class="nm">${w.name}</span><span class="cd">${w.code} · ${w.sector}</span>
          <span class="sc mono">${w.score}<small>分</small></span>
        </div>
        <div class="trig" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">觸發價 <b class="mono">${w.trigger_price}</b>
          <span class="quad ${w.quadrant}">· ${w.quadrant}</span><span>· 趨勢${w.trend}</span>
          <span style="margin-left:auto;font-size:10.5px;color:var(--gold);font-weight:800;white-space:nowrap">資訊卡 ▸</span></div>
        <div class="meta">${w.reason||""}</div>
      </div>`).join("");
  }catch(e){el.innerHTML='<div class="note">載入失敗:'+e+'</div>';}
}

// ── 驗證表 ──
async function loadVerify(){
  const el=document.getElementById("verify");
  try{
    const d=await (await fetch("/api/dec/verify?days=30")).json();
    const rows=d.rows||[];
    if(!rows.length){el.innerHTML='<div class="note">尚無驗證紀錄。第一份清單的隔日盤後會自動回填。</div>';return;}
    let h=`<div class="tbx"><table><tr>
      <th>日期</th><th>股票</th><th>軌</th><th>AI</th><th>觸發</th><th>進場</th>
      <th>隔日最高</th><th>隔日收盤</th><th>達標</th><th>持有</th><th>持有報酬</th></tr>`;
    rows.forEach(r=>{
      h+=`<tr>
        <td class="mono">${(r.target_date||"").slice(5)}</td>
        <td class="l"><span class="nm">${r.name}</span><br><span class="cd">${r.code}</span></td>
        <td><span class="tag" style="background:${r.track==="engine"?"var(--engine)":"var(--flowout)"}">${r.track==="engine"?"引擎":"攻擊"}</span></td>
        <td><span class="tag" style="background:${GRADE_C[r.grade]}">${r.grade}</span></td>
        <td class="${r.triggered?"ok":"no"}">${r.triggered?"✓":"✗"}</td>
        <td class="${r.entered?"ok":"no"}">${r.entered?"✓":"✗"}</td>
        <td class="mono">${pct(r.next_high_pct)}</td>
        <td class="mono">${pct(r.next_close_pct)}</td>
        <td class="${r.success?"ok":"no"}">${r.success?"✓":"✗"}</td>
        <td class="mono">${r.hold_days!=null?r.hold_days+"天":"—"}</td>
        <td class="mono">${pct(r.hold_ret_pct)}</td></tr>`;
    });
    el.innerHTML=h+"</table></div>";
  }catch(e){el.innerHTML='<div class="note">載入失敗:'+e+'</div>';}
}

// ── 統計 ──
async function loadStats(){
  const el=document.getElementById("stats");
  try{
    const d=await (await fetch("/api/dec/stats?days=30")).json();
    // 儀表
    const rd=(d.grades||[]).find(g=>g.grade==="Ready");
    if(rd&&rd.total){
      document.getElementById("dialHit").innerHTML=rd.hit_rate.toFixed(1)+"<small>%</small>";
      document.getElementById("dialSide").innerHTML=
        `共 <b>${rd.total}</b> 檔 · 成功 <b>${rd.success}</b> 檔<br>`+
        `隔日收盤均 <b>${rd.avg_next_close_pct>=0?"+":""}${rd.avg_next_close_pct??"—"}%</b>`+
        (rd.avg_hold_days!=null?` · 平均持有 <b>${rd.avg_hold_days}</b> 天`:"");
    }
    let h="";
    h+=`<div class="stat"><h3>分軌表現(近 ${d.window_days} 天,v3.0 核心)</h3>`;
    (d.tracks||[]).forEach(t=>{
      h+=`<div class="srow"><span class="k" style="color:${t.track==="engine"?"var(--engine)":"var(--flowout)"}">${t.track==="engine"?"引擎軌":"攻擊軌"} ${t.grade}</span>`+
        (t.total?`<span class="hit mono">${t.hit_rate}%</span>
          <span class="rest">共${t.total} · 進場${t.entered} · 均酬 ${t.avg_ret_pct>=0?"+":""}${t.avg_ret_pct}% ·
          持有 ${t.avg_hold_days??"—"}天 · 回撤 ${t.max_drawdown_pct??"—"}%<br>達標:${t.success_def}</span>`
        :`<span class="rest">樣本累積中(達標:${t.success_def})</span>`)+`</div>`;
    });
    h+=`</div>`;
    h+=`<div class="stat"><h3>分級表現(合併,舊制對照)</h3>`;
    (d.grades||[]).forEach(g=>{
      h+=`<div class="srow"><span class="k" style="color:${GRADE_C[g.grade]}">${g.grade}</span>`+
        (g.total?`<span class="hit mono">${g.hit_rate}%</span>
          <span class="rest">共${g.total}檔 · 成功${g.success} · 觸發${g.triggered} · 進場${g.entered}<br>
          隔日收盤均 ${g.avg_next_close_pct>=0?"+":""}${g.avg_next_close_pct}% ·
          持有 ${g.avg_hold_days??"—"} 天 · 持有均酬 ${g.avg_hold_ret_pct??"—"}% ·
          最大回撤 ${g.max_drawdown_pct??"—"}%</span>`
        :`<span class="rest">樣本累積中</span>`)+`</div>`;
    });
    if(d.hold_avoid) h+=`<div class="srow"><span class="k">Hold 避損</span>
      <span class="hit mono">${d.hold_avoid.avoid_rate}%</span>
      <span class="rest">健康分低者隔日確實未達標的比例(${d.hold_avoid.total} 樣本)</span></div>`;
    h+=`</div>`;

    h+=`<div class="stat"><h3>分數區間實際勝率</h3>`;
    (d.score_buckets||[]).forEach(b=>{
      h+=`<div class="srow"><span class="k mono">${b.bucket}</span>`+
        (b.total?`<span class="hit mono">${b.hit_rate}%</span>
           <div class="bary"><i style="width:${b.hit_rate}%"></i></div>
           <span class="rest mono">${b.total}檔</span>`
        :`<span class="rest">—</span>`)+`</div>`;
    });
    h+=`</div>`;

    h+=`<div class="stat"><h3>四象限隔日表現(全池 50 檔)</h3>`;
    (d.quadrants||[]).forEach(q=>{
      h+=`<div class="srow"><span class="k quad ${q.quadrant}">${q.quadrant}</span>
        <span class="hit mono">${q.win_rate??"—"}%</span>
        <span class="rest">${q.name} · ${q.total} 樣本 · 隔日均 ${q.avg_next_chg>=0?"+":""}${q.avg_next_chg??"—"}%</span></div>`;
    });
    h+=`</div>`;
    el.innerHTML=h||'<div class="note">統計累積中</div>';
  }catch(e){el.innerHTML='<div class="note">載入失敗:'+e+'</div>';}
}

// ── 模式切換 / 按鈕 ──
function switchMode(m){
  document.querySelectorAll(".modeseg .m").forEach(x=>x.classList.toggle("on",x.dataset.mode===m));
  ["watch","verify","stats"].forEach(id=>
    document.getElementById(id).style.display=id===m?"":"none");
}
document.querySelectorAll(".modeseg .m").forEach(x=>x.onclick=()=>switchMode(x.dataset.mode));
function loadAll(){loadBrief();loadWatch();loadVerify();loadStats();}
document.getElementById("refreshBtn").onclick=loadAll;
document.getElementById("runBtn").onclick=async()=>{
  toast("盤後計算中(重抓收盤 → 驗證 → 清單)…");
  try{
    const d=await (await fetch("/api/dec/run",{method:"POST"})).json();
    toast(d.ok?`完成:觀察 ${d.watch} 檔 · 驗證回填 ${d.verified} 檔`:"失敗:"+(d.error||""));
    loadAll();
  }catch(e){toast("失敗:"+e);}
};
loadAll();
</script>
